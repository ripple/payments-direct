components:
  securitySchemes:
    Bearer:
      type: http
      scheme: bearer
      bearerFormat: JWT
    BasicAuth:
      type: http
      scheme: basic
  schemas:
    AuthenticationRequest:
      description: The authentication request.
      properties:
        client_id:
          type: string
          description: The client ID associated with a specific set of API credentials.
          example: '{YOUR_CLIENT_ID}'
        client_secret:
          type: string
          description: The client secret associated with a specific set of API credentials.
          example: '{YOUR_CLIENT_SECRET}'
        audience:
          type: string
          description: |
            The value of the `audience` field is based on [URN](https://en.wikipedia.org/wiki/Uniform_Resource_Name) syntax.

            **Format**: `urn:ripplexcurrent-{ENVIRONMENT_STRING}:{YOUR_TENANT_ID}`

            * The first component is `urn:ripplenetxcurrent-`.
            * The second component refers to the environment you want to access.
            * The third component is your tenant ID. Ripple integration engineers provide this component during training.

            | Environment | Environment string | Description |
            | --- | --- | --- |
            | Test | `test` | Test environment with simulated partners and simulated currency. |
            | Production | `prod` | Production environment for Ripple's internal services. |

            **Example**: `urn:ripplexcurrent-test:{YOUR_TENANT_ID}`
          example: urn:ripplexcurrent-test:{YOUR_TENANT_ID}
        grant_type:
          type: string
          description: Set the grant-type for this client credentials request. This
            must be set to `client_credentials`.
          enum:
          - client_credentials
          example: client_credentials
      required:
      - client_id
      - client_secret
      - audience
      - grant_type
      type: object
    AuthenticationResponse:
      description: The authentication response object that includes the token, type,
        scopes, and expiry.
      properties:
        access_token:
          type: string
          description: The bearer token you use when authenticating with a Ripple
            API.
          example: eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzUxMiJ9.eyJ
        scope:
          type: string
          description: List of scopes applied to your `access_token`.
          example: pos:payments:create quote_collection:quote:create quote:quote:read
            pos:payments:read pcs_config:external_read data_requirements:read identities:create
            identities:read identities:write ledger:balance:read ledger:read
        expires_in:
          type: integer
          format: int64
          description: How long your `access_token` is valid. You need to request
            a new token when it expires.
          example: 3600
        token_type:
          type: string
          description: The type of token. Ripple APIs use `Bearer` auth tokens.
          example: Bearer
      type: object
    ErrorResponse:
      description: The response object containing the error and its description if
        the authentication call fails.
      properties:
        error_description:
          type: string
          description: Summary of the returned problem.
          example: Unauthorized
        error:
          type: string
          description: Error status.
          example: access_denied
    ValidateTokenResponse:
      description: The response object indicating a token's validity and the time
        remaining on it
      properties:
        message:
          type: string
          example: token_ok
        seconds_to_expiry:
          type: integer
          format: int64
          description: Remaining time in seconds before the tested token expires.
          example: 3600
    PaymentErrorResponse:
      type: object
      required:
      - status
      - errors
      properties:
        errors:
          description: List of payment errors
          type: array
          $ref: '#/components/schemas/PaymentError'
        status:
          type: string
          description: Error Response Status
          example: 400
    PaymentError:
      type: object
      required:
      - code
      - title
      - type
      - description
      - timestamp
      properties:
        code:
          type: string
          description: A unique identifier for  the error
          example: SYS_003
        type:
          type: string
          description: A high-level categorization of the error, indicating the type
            of issue that occurred
          example: SYSTEM_ERROR
        title:
          type: string
          description: A brief, user-friendly description of the error
          example: Internal Server Error
        description:
          type: string
          description: A more detailed explanation of the error, potentially including
            information about what caused the error and the next steps
          example: The payout category value must be one of BANK, EWALLET, CASH_PICKUP,
            or ATM.
        timestamp:
          type: string
          format: date-time
          example: '2024-11-21T14:15:22Z'
    PaymentV2:
      type: object
      required:
      - paymentId
      - paymentState
      properties:
        paymentId:
          description: The unique ID that identifies this payment. This value is the
            same as the quote ID.
          type: string
          format: uuid
          maxLength: 36
          example: 7ea3399c-1234-5678-8d8f-d320ea406630
        cryptoTransactionHash:
          description: Transaction hash of the crypto payment on the destination blockchain
            network
          type: string
          example: '0x2b1f8b57dd6008143ff926ea9d9cd2365774cd0c5e6f379558a88c61c52071eb'
        initiatedAt:
          description: The time at which the payment was initiated, specified in UTC.
          type: string
          format: date-time
          example: '2019-08-24T14:15:22Z'
        expiresAt:
          description: The time at which this payment expires, specified in UTC.
          type: string
          format: date-time
          example: '2019-08-24T14:15:22Z'
        lastStateUpdatedAt:
          description: The time at which the payment state was last updated for this
            payment, specified in UTC.
          type: string
          format: date-time
          example: '2019-08-24T14:15:22Z'
        paymentState:
          $ref: '#/components/schemas/PaymentStateV2'
        originator:
          $ref: '#/components/schemas/OriginatorV2'
        destination:
          $ref: '#/components/schemas/DestinationV2'
        adjustedExchangeRate:
          $ref: '#/components/schemas/AdjustedExchangeRate'
        fees:
          type: array
          description: A summary of fees included in the payment quote.
          items:
            $ref: '#/components/schemas/FeeSummary'
        taxes:
          type: array
          description: A summary of taxes included in the payment quote.
          items:
            $ref: '#/components/schemas/TaxSummary'
        sourceOfCash:
          description: Source of Cash may be required depending on corridor and payout
            partner. Valid Source of Cash values vary by corridor.
          type: string
          example: EMIN
        purposeCode:
          description: Purpose Code may be required depending on corridor and payout
            partner. Valid Purpose Code values vary by corridor.
          type: string
          example: PAYR
        transactionDetails:
          $ref: '#/components/schemas/TransactionDetailsV2'
        paymentLabels:
          $ref: '#/components/schemas/PaymentLabels'
        receiverRelationship:
          description: The relationship to the debtor.
          type: string
          example: SUBS
        paymentMemo:
          $ref: '#/components/schemas/PaymentMemo'
    PaymentWithDetailsV2:
      type: object
      required:
      - paymentId
      - paymentState
      properties:
        paymentId:
          description: The unique ID that identifies this payment. This value is the
            same as the quote ID.
          type: string
          format: uuid
          maxLength: 36
          example: 7ea3399c-1234-5678-8d8f-d320ea406630
        cryptoTransactionHash:
          description: Transaction hash of the crypto payment on the destination blockchain
            network
          type: string
          example: '0x2b1f8b57dd6008143ff926ea9d9cd2365774cd0c5e6f379558a88c61c52071eb'
        initiatedAt:
          description: The time at which the payment was initiated, specified in UTC.
          type: string
          format: date-time
          example: '2019-08-24T14:15:22Z'
        expiresAt:
          description: The time at which this payment expires, specified in UTC.
          type: string
          format: date-time
          example: '2019-08-24T14:15:22Z'
        lastStateUpdatedAt:
          description: The time at which the payment state was last updated for this
            payment, specified in UTC.
          type: string
          format: date-time
          example: '2019-08-24T14:15:22Z'
        paymentState:
          $ref: '#/components/schemas/PaymentStateV2'
        originator:
          $ref: '#/components/schemas/OriginatorV2'
        destination:
          $ref: '#/components/schemas/DestinationV2'
        adjustedExchangeRate:
          $ref: '#/components/schemas/AdjustedExchangeRate'
        fees:
          type: array
          description: A summary of fees included in payment quote.
          items:
            $ref: '#/components/schemas/FeeSummary'
        taxes:
          type: array
          description: A summary of taxes included in the payment quote.
          items:
            $ref: '#/components/schemas/TaxSummary'
        sourceOfCash:
          description: Source of Cash may be required depending on corridor and payout
            partner. Valid Source of Cash values vary by corridor.
          type: string
          example: EMIN
        purposeCode:
          description: Purpose Code may be required depending on corridor and payout
            partner. Valid Purpose Code values vary by corridor.
          type: string
          example: PAYR
        transactionDetails:
          $ref: '#/components/schemas/TransactionDetailsV2'
        errors:
          type: array
          items:
            $ref: '#/components/schemas/PaymentError'
        paymentLabels:
          $ref: '#/components/schemas/PaymentLabels'
        receiverRelationship:
          description: The relationship to the debtor.
          type: string
          example: SUBS
        paymentMemo:
          $ref: '#/components/schemas/PaymentMemo'
    StateTransitionsResponseV2:
      type: object
      properties:
        stateTransitions:
          type: array
          items:
            $ref: '#/components/schemas/StateTransitionV2'
      required:
      - stateTransitions
    StateTransitionV2:
      type: object
      properties:
        updatedFrom:
          $ref: '#/components/schemas/PaymentStateV2'
          description: The initial payment state before it was updated.
          example: INITIATED
        updatedTo:
          $ref: '#/components/schemas/PaymentStateV2'
          description: The payment state after it was updated.
          example: VALIDATING
        updatedAt:
          type: string
          format: date-time
          description: The timestamp when the payment state was updated.
          example: '2024-08-13T20:15:50.990995Z'
      required:
      - updatedFrom
      - updatedTo
      - updatedAt
    PaymentsResponseV2:
      type: object
      properties:
        data:
          description: Array of Payment objects
          type: array
          items:
            $ref: '#/components/schemas/PaymentV2'
        filter:
          $ref: '#/components/schemas/PaymentFilterV2'
        sort:
          $ref: '#/components/schemas/SortV2'
        page:
          $ref: '#/components/schemas/Page'
    PaymentRequestV2:
      type: object
      required:
      - quoteId
      - beneficiaryIdentityId
      - beneficiaryFinancialInstrumentId
      properties:
        quoteId:
          description: ID of the quote you want to accept to initiate this payment.
            Must be in UUID format. This will be used as paymentId.
          type: string
          format: uuid
          example: 7ea3399c-1234-5678-8d8f-d320ea406630
        originatorIdentityId:
          description: The identity ID of the payment originator. You can find the
            identity ID using the `GET /identities` operation.
          type: string
          example: 7ea3399c-1234-5678-8d8f-d320ea406630
        beneficiaryIdentityId:
          description: The identity ID of the payment beneficiary. You can find the
            identity ID using the `GET /identities` operation.
          type: string
          example: 7ea3399c-1234-5678-8d8f-d320ea406630
        internalId:
          maxLength: 36
          description: Customer defined value, such as an invoice number.
          type: string
          example: Invoice-123
        purposeCode:
          description: Purpose Code may be required depending on corridor and payout
            partner. Valid Purpose Code values vary by corridor.
          type: string
          example: PAYR
        sourceOfCash:
          description: Source of Cash may be required depending on corridor and payout
            partner. Valid Source of Cash values vary by corridor.
          type: string
          example: EMIN
        paymentLabels:
          $ref: '#/components/schemas/PaymentLabels'
        beneficiaryFinancialInstrumentId:
          description: |
            The financial instrument ID associated with a payment beneficiary’s identity.
            This value must reference a financial instrument created for the same beneficiary identity using Identity Management v3. Use the `financialInstrumentId` returned when you create or fetch the beneficiary’s payout instrument.
          type: string
          example: 7ea3399c-1234-5678-8d8f-d320ea406630
        receiverRelationship:
          description: The relationship to the debtor.
          type: string
          example: SUBS
        paymentMemo:
          $ref: '#/components/schemas/PaymentMemo'
    PaymentStateV2:
      type: string
      example: INITIATED
      description: |
        Current state of a payment.

        The payment lifecycle currently uses the following values: 
        - `QUOTED` 
        - `INITIATED` 
        - `VALIDATING` 
        - `TRANSFERRING` 
        - `COMPLETED` 
        - `FAILED` 
        - `RETURNED` 
        - `DECLINED`

        Additional states may be introduced in the future without breaking existing integrations.
      x-enumDescriptions:
        QUOTED: A quote has been created, but the payment has not yet been initiated.
        INITIATED: The payment has been submitted and is awaiting validation.
        VALIDATING: Ripple is validating the payment details and reserving funds from
          the originator’s available balance.
        TRANSFERRING: The payment is being processed and funds are moving through
          the network toward the beneficiary.
        COMPLETED: The payment has completed and the beneficiary has received the
          funds.
        FAILED: The payment could not be completed. The failure reason, if available,
          is listed in the response. Funds that were previously reserved to complete
          the payment are released and added back to the available balance.
        RETURNED: The payment was returned by a downstream institution. The return
          reason, if available, is listed in the response. Funds that were previously
          reserved and debited to complete the payment are returned and added back
          to the available balance.
        DECLINED: The payment was declined due to user input errors or business rule
          violations. The decline reason, if available, is listed in the response.
          Funds that were previously reserved to complete the payment are released
          and added back to the available balance.
    PaymentSortFieldV2:
      type: string
      description: |
        The field to use when sorting payments in the requested sort order.

        Currently supported values include: 
        - `internalId` 
        - `paymentState` 
        - `sourceCurrency` 
        - `sourceAmount` 
        - `destinationCurrency` 
        - `destinationCountry` 
        - `destinationAmount` 
        - `initiatedAt` 
        - `expiresAt` 
        - `lastStateUpdatedAt` 
        - `paymentLabel`

