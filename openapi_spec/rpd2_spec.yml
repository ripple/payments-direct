        EFT:
        - Availability: Business days only
        - Limit: CAD 1,000,000
        - Settlement: T+1
        - Cut-off time: ~4:30 PM EST
        - Banking holidays: Canadian banking holidays apply

        Routing Evaluation Order: Not applicable
      required:
      - bankName
      - institutionNumber
      - transitNumber
      - accountNumber
      - accountType
      properties:
        bankName:
          type: string
          description: The name of the identity's bank
          minLength: 2
          maxLength: 140
          pattern: ^(?![ .,'&\/()-])(?!.*([ .,'&\/()-])\1)[\p{L}\p{N} .,'&\/()-]+(?<![
            .,'&\/-])?$
        institutionNumber:
          type: string
          description: The institution number of the identity's bank
          minLength: 3
          maxLength: 3
          pattern: ^\d+$
        transitNumber:
          type: string
          description: The transit number of the identity's bank account
          minLength: 5
          maxLength: 5
          pattern: ^\d+$
        accountNumber:
          type: string
          description: The identity's account number associated with the Account Identification
            Scheme
          minLength: 7
          maxLength: 12
          pattern: ^\d+$
        accountType:
          type: string
          description: |
            The identity’s account type.

            - `CHECKING` — Checking account  
            - `SAVINGS` — Savings account
    payment-rail-objects:
      type: object
      properties:
        usAch:
          $ref: '#/components/schemas/us-ach'
        usFedwire:
          $ref: '#/components/schemas/us-fedwire'
        mxSpei:
          $ref: '#/components/schemas/mx-spei'
        euSepa:
          $ref: '#/components/schemas/eu-sepa'
        gbFps:
          $ref: '#/components/schemas/gb-fps'
        africaBankPayout:
          $ref: '#/components/schemas/africa-bank-payout'
        brPix:
          $ref: '#/components/schemas/br-pix'
        coPse:
          $ref: '#/components/schemas/co-pse'
        brTed:
          $ref: '#/components/schemas/br-ted'
        caEft:
          $ref: '#/components/schemas/ca-eft'
    ripple-financial-instrument:
      type: object
      description: |
        Request to create a new financial instrument for an identity.
      allOf:
      - $ref: '#/components/schemas/payment-rail-objects'
      - type: object
        properties:
          currency:
            $ref: '#/components/schemas/financial-instrument-currency'
          label:
            type: string
            description: A user-defined label for the financial instrument.
            example: mexico bank account
          financialInstrumentType:
            $ref: '#/components/schemas/financial-instrument-type'
      required:
      - financialInstrumentType
      - currency
    ripple-financial-instrument-entry:
      allOf:
      - $ref: '#/components/schemas/ripple-financial-instrument'
      - type: object
        properties:
          country:
            type: string
            description: The country of the financial instrument.
            example: MX
            minLength: 2
            maxLength: 2
            pattern: ^[A-Z]+$
          financialInstrumentId:
            type: string
            description: The unique identifier of the financial instrument.
            example: 3fc74743-e7f3-414a-9fcf-eb8c1d52356a
          createdAt:
            type: string
            format: date-time
            description: The time at which the financial instrument was created
            example: '2023-11-02T18:26:00.000Z'
          updatedAt:
            type: string
            format: date-time
            description: The time at which the financial instrument was last updated
            example: '2023-11-03T18:26:00.000Z'
    put-ripple-financial-instrument:
      type: object
      description: |
        Request to update an existing financial instrument of an identity.
      allOf:
      - $ref: '#/components/schemas/payment-rail-objects'
      properties:
        label:
          type: string
          description: A user-defined label for the financial instrument.
          example: mexico bank account
    QuoteErrorResponse:
      type: object
      required:
      - errors
      - status
      properties:
        errors:
          description: List of quote errors
          type: array
          items:
            $ref: '#/components/schemas/QuoteError'
        status:
          type: integer
          description: Response status code
      additionalProperties: false
    QuoteError:
      type: object
      required:
      - code
      - title
      - type
      - description
      - timestamp
      properties:
        code:
          type: string
          minLength: 1
          maxLength: 128
          description: Unique identifier of an error
          example: SYS_100
        title:
          type: string
          minLength: 1
          maxLength: 128
          description: Error message providing a brief summary of the error
          example: Unable to process the request due to an internal server error.
        type:
          type: string
          minLength: 1
          maxLength: 128
          description: Identifies the problem type
          example: USER_VALIDATION_ERROR
        description:
          type: string
          minLength: 1
          maxLength: 1024
          description: Provides more technical information
          example: Customer not found
        timestamp:
          type: string
          minLength: 1
          maxLength: 128
          format: date-time
          description: The time when this error occurred, specified in UTC.
          example: '2023-11-02T18:26:00.000123Z'
      additionalProperties: false
    QuoteStatus:
      type: string
      enum:
      - EXPIRED
      - ACTIVE
      x-enumDescriptions:
        EXPIRED: Expired quote
        ACTIVE: Quote that you can accept to create a payment.
      example: ACTIVE
    QuoteAmountType:
      type: string
      description: The type of amount for which you want to get a quote.
      default: SOURCE_AMOUNT
      enum:
      - SOURCE_AMOUNT
      - DESTINATION_AMOUNT
      x-enumDescriptions:
        SOURCE_AMOUNT: Specify this value to get a quote for the amount that you want
          to send.
        DESTINATION_AMOUNT: Specify this value to get a quote for the amount that
          the beneficiary should receive.
    QuoteCollectionRequest:
      type: object
      description: Request to create a quote collection
      required:
      - quoteAmountType
      - quoteAmount
      - sourceCurrency
      - destinationCurrency
      - payoutCategory
      - payinCategory
      properties:
        quoteAmount:
          description: The amount for which you wish to receive a collection of quotes.
          type: number
          format: double
          minimum: 1
          maximum: 100000000
          example: 123.45
        quoteAmountType:
          $ref: '#/components/schemas/QuoteAmountType'
        sourceCurrency:
          description: The currency code of the currency that you are sending.
          type: string
          pattern: ^[a-zA-Z]{3,5}$
          example: USD
        destinationCurrency:
          description: The currency code of the currency in which your beneficiary
            will receive this payment.
          type: string
          pattern: ^[a-zA-Z]{3,5}$
          example: MXN
        sourceCountry:
          description: The country code of the country from where you are sending
            the funds. This is an ISO 3166-1 alpha-2 code.
          type: string
          pattern: ^[a-zA-Z]{2}$
          example: US
        destinationCountry:
          description: The country where the beneficiary is located specified in Alpha-2
            Code format as defined in the ISO CountryCode ISO 3166-1 list. If the
            beneficiary is an individual, then this value is their country of residence.
            If the beneficiary is an institution, then this value is their the country
            of incorporation.
          type: string
          pattern: ^[a-zA-Z]{2}$
          example: PH
        payoutCategory:
          description: The name of the payout category.
          type: string
          minLength: 1
          maxLength: 128
          x-enumDescriptions:
            BANK: Indicates that the payout will be made in fiat currency to a recipient’s
              bank account through local banking rails.
            CRYPTO: Indicates that the payout will be made in stablecoin to a recipient’s
              crypto wallet address.
          example: BANK
        payinCategory:
          description: The name of the pay in category indicating how this payment
            will be funded.
          type: string
          minLength: 1
          maxLength: 128
          x-enumDescriptions:
            FUNDED: Indicates that the payment is being made from funds you've deposited
              with Ripple.
            T_PLUS_ONE: Indicates the payment is being made and you will pay the outstanding
              invoice.
          example: FUNDED
        destinationBlockchainNetwork:
          description: The name of the blockchain network on which the beneficiary
            will receive this payment.
          type: string
          minLength: 1
          maxLength: 20
          example: Ethereum
      additionalProperties: false
    Quote:
      type: object
      required:
      - quoteId
      - quoteStatus
      - sourceCurrency
      - destinationCurrency
      - payoutCategory
      - payinCategory
      properties:
        quoteId:
          description: Unique ID that represents this quote.
          type: string
          format: uuid
          minLength: 1
          maxLength: 36
          example: 7ea3399c-1234-5678-8d8f-d320ea406630
        quoteStatus:
          $ref: '#/components/schemas/QuoteStatus'
        quoteAmountType:
          $ref: '#/components/schemas/QuoteAmountType'
        sourceAmount:
          description: Amount to be sent by the originator.
          type: number
          format: double
          minimum: 1
          maximum: 100000000
          example: 123.45
        destinationAmount:
          description: Amount to be received by destination
          type: number
          minimum: 1
          maximum: 100000000
          format: double
          example: 2438.19
        sourceCurrency:
          description: The currency code of the currency that you are sending.
          type: string
          pattern: ^[a-zA-Z]{3,5}$
          example: USD
        destinationCurrency:
          description: The currency code of the currency in which your beneficiary
            will receive this payment.
          type: string
          pattern: ^[a-zA-Z]{3,5}$
          example: MXN
        sourceCountry:
          description: The country where the payment originator is located or incorporated,
            specified in Alpha-2 Code format as defined in the ISO CountryCode ISO
            3166-1 list.
          type: string
          pattern: ^[a-zA-Z]{2}$
          example: US
        destinationCountry:
          description: The country code to which you wish to send the funds. It follows
            ISO 3166-1 alpha-2 code
          type: string
          pattern: ^[a-zA-Z]{2}$
          example: MX
        payoutCategory:
          description: Name of the payout category specified in the quote request.
          type: string
          minLength: 1
          maxLength: 128
          example: BANK
        payinCategory:
          description: The name of payin category specified in the quote request.
          type: string
          minLength: 1
          maxLength: 128
          example: FUNDED
        adjustedExchangeRate:
          $ref: '#/components/schemas/AdjustedExchangeRate'
        fees:
          type: array
          description: A summary of fees included in this quote.
          items:
            $ref: '#/components/schemas/FeeSummary'
        taxes:
          type: array
          description: A summary of taxes included in this quote.
          items:
            $ref: '#/components/schemas/TaxSummary'
        createdAt:
          type: string
          minLength: 1
          maxLength: 128
          format: date-time
          example: '2023-11-02T18:26:00.000123Z'
          description: The time when this quote was created, specified in UTC.
        expiresAt:
          type: string
          minLength: 1
          maxLength: 128
          format: date-time
          example: '2023-11-02T18:26:00.000123Z'
          description: The time when this quote expires, specified in UTC.
        destinationBlockchainNetwork:
          description: The name of the blockchain network on which the beneficiary
            will receive this payment.
          type: string
          minLength: 1
          maxLength: 20
          example: Ethereum
      additionalProperties: false
    QuoteCollection:
      type: object
      required:
      - quoteCollectionId
      - quotes
      properties:
        quoteCollectionId:
          description: Unique ID that represents this quote collection.
          type: string
          minLength: 1
          maxLength: 36
          format: uuid
          example: 11111111-aaaa-2222-bbbb-222222222222
        quotes:
          description: List of quotes
          type: array
          minItems: 0
          items:
            $ref: '#/components/schemas/Quote'
      additionalProperties: false
  examples:
    error-500-example:
      value:
        code: '500'
        category: APPLICATION
        title: Internal Server Error
        detail: The server encountered an error.
        retryable: true
    error-400-example:
      value:
        code: '400'
        category: CLIENT_ERROR
        title: Bad Request
        detail: Invalid request. Check your request parameters and try again.
        retryable: true
    error-404-example:
      value:
        code: '404'
        category: CLIENT_ERROR
        title: Not Found
        detail: The identity does not exist. Please provide a valid identityId.
        retryable: false
    error-409-example:
      value:
        code: '409'
        category: CLIENT_ERROR
        title: Conflict
        detail: A conflict occurred. The resource already exists or cannot be processed
          due to a conflict.
        retryable: false
