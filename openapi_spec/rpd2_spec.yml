    business-identity:
      type: object
      title: Business identity
      description: |
        PII data to support business and institutional identities
      required:
      - businessName
      - address
      properties:
        businessName:
          type: string
          description: Business Legal Name
          pattern: ^(?![ .,'&\/()-])(?!.*([ .,'&\/()-])\1)[\p{L}\p{N} .,'&\/()-]+(?<![
            .,'&\/-])?$
          minLength: 1
          maxLength: 140
          example: Widgets Org
        address:
          type: object
          description: Holds general information about the business
          required:
          - streetAddress
          - country
          - city
          - stateOrProvince
          - postalCode
          properties:
            streetAddress:
              type: array
              description: Allows the street address of the business to be held
              items:
                type: string
                description: Street address of the business
                minLength: 1
                maxLength: 70
                pattern: ^[^\p{C}\r\n<>]+$
              example:
              - 123 Example St. Boston, MA
            country:
              type: string
              description: Allows the country of the business to be held. Use Alpha-2
                Code as defined in the [ISO CountryCode ISO 3166-1](https://www.iso.org/obp/ui/#search)
                list.
              minLength: 2
              maxLength: 2
              pattern: ^[A-Z]+$
              example: US
            city:
              type: string
              description: City
              minLength: 1
              maxLength: 140
              pattern: ^(?![ .'-])(?!.*[ .'-]{2})[\p{L} .'-]+(?<![ .'-])$
              example: Boston
            stateOrProvince:
              type: string
              description: Information that locates and identifies the state / county
                for the individual, as defined by postal services.
              minLength: 1
              maxLength: 140
              pattern: ^(?![ .'-])(?!.*[ .'-]{2})[\p{L}\p{N} .'-]+(?<![ .'-])$
              example: Massachusetts
            postalCode:
              type: string
              description: Postal code for the business
              minLength: 3
              maxLength: 15
              pattern: ^[\p{L}\p{N}][\p{L}\p{N} -]{1,15}[\p{L}\p{N}]$
              example: '12345'
        email:
          x-requiredByBeneficiaryFor:
          - BR_PIX
          - BR_TED
          - CO_PSE
          x-requiredByOriginatorFor:
          - BR_PIX
          - BR_TED
          type: string
          description: Address for electronic mail (e-mail).
          format: email
          minLength: 6
          maxLength: 255
          pattern: ^(?=.{1,254}$)(?:[\p{L}\p{N}%+_-]+(?:\.[\p{L}\p{N}%+_-]+)*)@(?:(?:[\p{L}\p{N}](?:[\p{L}\p{N}-]{0,61}[\p{L}\p{N}])?)\.)+[\p{L}]{2,63}$
          example: fake@example.com
        phone:
          x-requiredByBeneficiaryFor:
          - BR_PIX
          - BR_TED
          - AFRICA_BANK_PAYOUT
          x-requiredByOriginatorFor:
          - BR_PIX
          - BR_TED
          - AFRICA_BANK_PAYOUT
          type: string
          description: Phone Number
          minLength: 8
          maxLength: 16
          pattern: ^\+[1-9]\d+$
          example: 1234567890
        registration:
          x-requiredByBeneficiaryFor:
          - BR_PIX
          - BR_TED
          - CO_PSE
          - CA_EFT
          - US_ACH
          - AFRICA_BANK_PAYOUT
          x-requiredByOriginatorFor:
          - US_ACH
          - CA_EFT
          - BR_PIX
          - BR_TED
          - EU_SEPA
          type: array
          description: Unique and unambiguous way to identify a business or organization.
            An array of objects, each containing unique identification of an organization,
            as assigned by an institution, using an identification scheme.
          items:
            type: object
            required:
            - number
            - type
            properties:
              number:
                type: string
                description: The unique identifier of the organization
                example: 123ABC
                minLength: 3
                maxLength: 35
                pattern: ^(?![ .'-\/])(?!.*[ .'-\/]{2})([A-Za-z0-9 .'-\/]+)(?<![ .'-\/])\/?$
              type:
                type: string
                description: |
                  Type of business identification document. Accepted values are:

                  - `INCORPORATION_CERTIFICATE` — Certificate of Incorporation Number  
                  - `TAX_ID` — Tax Identification Number
                example: INCORPORATION_CERTIFICATE
        incorporationCountry:
          x-requiredByBeneficiaryFor:
          - BR_PIX
          - BR_TED
          - AFRICA_BANK_PAYOUT
          x-requiredByOriginatorFor:
          - BR_PIX
          - BR_TED
          type: string
          description: Information that locates and identifies the country, as defined
            by postal services where the organization was incorporated. Use Alpha-2
            Code as defined in the ISO CountryCode ISO 3166-1 list.
          minLength: 2
          maxLength: 2
          pattern: ^[A-Z]+$
          example: US
    individual-identity:
      type: object
      title: Individual identity
      description: |
        Data for an individual
      required:
      - firstName
      - lastName
      - address
      properties:
        firstName:
          type: string
          description: First name of the individual
          pattern: ^(?![ .'-])(?!.*([ .'-])\1)[\p{L} .'-]+(?<![ .'-])$
          minLength: 1
          maxLength: 140
          example: John
        lastName:
          type: string
          description: Last name of the individual
          pattern: ^(?![ .'-])(?!.*([ .'-])\1)[\p{L} .'-]+(?<![ .'-])$
          minLength: 1
          maxLength: 140
          example: Smith
        address:
          type: object
          description: Holds general information about the individual
          required:
          - streetAddress
          - country
          - city
          - stateOrProvince
          - postalCode
          properties:
            streetAddress:
              type: array
              description: Allows the street address of the individual to be held
              items:
                type: string
                description: Street address of the individual
                minLength: 1
                maxLength: 70
                pattern: ^[^\p{C}\r\n<>]+$
              example:
              - 123 Example St. Boston, MA
            country:
              type: string
              description: Allows the Country of the individual to be held. Use Alpha-2
                Code as defined in the [ISO CountryCode ISO 3166-1](https://www.iso.org/obp/ui/#search)
                list.
              minLength: 2
              maxLength: 2
              pattern: ^[A-Z]+$
              example: US
            city:
              type: string
              description: City
              minLength: 1
              maxLength: 140
              pattern: ^(?![ .'-])(?!.*[ .'-]{2})[\p{L} .'-]+(?<![ .'-])$
              example: Boston
            stateOrProvince:
              type: string
              description: Information that locates and identifies the state / county
                for the party, as defined by postal services
              minLength: 1
              maxLength: 140
              pattern: ^(?![ .'-])(?!.*[ .'-]{2})[\p{L}\p{N} .'-]+(?<![ .'-])$
              example: Massachusetts
            postalCode:
              type: string
              description: Postal code for the individual's address
              minLength: 3
              maxLength: 15
              pattern: ^[\p{L}\p{N}][\p{L}\p{N} -]{1,15}[\p{L}\p{N}]$
              example: '12345'
        email:
          x-requiredByBeneficiaryFor:
          - BR_PIX
          - BR_TED
          - CO_PSE
          type: string
          description: Address for electronic mail (e-mail).
          format: email
          minLength: 6
          maxLength: 255
          pattern: ^(?=.{1,254}$)(?:[\p{L}\p{N}%+_-]+(?:\.[\p{L}\p{N}%+_-]+)*)@(?:(?:[\p{L}\p{N}](?:[\p{L}\p{N}-]{0,61}[\p{L}\p{N}])?)\.)+[\p{L}]{2,63}$
          example: fake@example.com
        phone:
          x-requiredByBeneficiaryFor:
          - BR_PIX
          - BR_TED
          - AFRICA_BANK_PAYOUT
          type: string
          description: Phone Number
          minLength: 8
          maxLength: 16
          pattern: ^\+[1-9]\d+$
          example: 1234567890
        identityDocuments:
          x-requiredByBeneficiaryFor:
          - US_ACH
          - BR_PIX
          - BR_TED
          - CO_PSE
          - AFRICA_BANK_PAYOUT
          x-requiredByOriginatorFor:
          - BR_PIX
          - BR_TED
          description: Gathers identifying documentation
          type: array
          items:
            type: object
            required:
            - idNumber
            - idType
            properties:
              idNumber:
                type: string
                description: Identification Number.
                minLength: 3
                maxLength: 35
                pattern: ^(?![ .'-\/])(?!.*[ .'-\/]{2})([A-Za-z0-9 .'-\/]+)(?<![ .'-\/])\/?$
                example: 123ABC
              idType:
                type: string
                description: |
                  The type of identification document used to identify the identity.

                  - `ALIEN_REGISTRATION` — Alien Registration Number  
                  - `CUSTOMER_ID` — Customer Identification Number  
                  - `DRIVERS_LICENSE` — Driver’s License Number  
                  - `PASSPORT` — Passport Number  
                  - `EMPLOYEE_ID` — Employee ID  
                  - `NATIONAL_ID_NUMBER` — National ID  
                  - `SSN` — Social Security Number  
                  - `TAX_ID` — Tax ID
        dateOfBirth:
          x-requiredByBeneficiaryFor:
          - US_ACH
          - EU_SEPA
          - GB_FPS
          - BR_PIX
          - BR_TED
          - CA_EFT
          x-requiredByOriginatorFor:
          - EU_SEPA
          - GB_FPS
          - BR_PIX
          - BR_TED
          type: string
          format: date
          description: Date of Birth.
          example: '2001-01-24'
        countryOfBirth:
          x-requiredByOriginatorFor:
          - AFRICA_BANK_PAYOUT
          - BR_PIX
          - BR_TED
          type: string
          description: Country of Birth. Use Alpha-2 Code as defined in the [ISO CountryCode
            ISO 3166-1](https://www.iso.org/obp/ui/#search) list.
          minLength: 2
          maxLength: 2
          pattern: ^[A-Z]+$
          example: US
        citizenship:
          x-requiredByBeneficiaryFor:
          - BR_PIX
          - BR_TED
          - AFRICA_BANK_PAYOUT
          x-requiredByOriginatorFor:
          - BR_PIX
          - BR_TED
          type: string
          description: Alpha-2 country code for the nationality of the individual
            in ISO 3166-1 format.
          minLength: 2
          maxLength: 2
          pattern: ^[A-Z]+$
          example: US
        gender:
          x-requiredByBeneficiaryFor:
          - AFRICA_BANK_PAYOUT
          type: string
          description: |
            Gender of the identity.

            - `MALE` — Male identity  
            - `FEMALE` — Female identity  
            - `OTHER` — Other identity
    ripple-identity:
      type: object
      required:
      - identityType
      - paymentRole
      properties:
        identityType:
          $ref: '#/components/schemas/identity-type-v3'
        paymentRole:
          $ref: '#/components/schemas/payment-role'
        internalId:
          x-requiredByOriginatorFor:
          - ALL
          type: string
          description: |
            Optional client-provided unique identifier for idempotency and deduplication. 
            Must be unique across all active identities within your tenant. Duplicate values will result in a 409 Conflict error.
          example: customer-12345-uuid
        business:
          $ref: '#/components/schemas/business-identity'
        individual:
          $ref: '#/components/schemas/individual-identity'
    financial-instrument-type:
      type: string
      description: |
        The type of financial instrument or payment rail used for executing the transaction.
        This determines the structure and validation of account details required for the payout.
      x-extensible-enum:
      - US_ACH
      - US_FEDWIRE
      - MX_SPEI
      - EU_SEPA
      - GB_FPS
      - AFRICA_BANK_PAYOUT
      - BR_PIX
      - CO_PSE
      - BR_TED
      - CA_EFT
      x-enumDescriptions:
        US_ACH: Automated Clearing House - U.S. batch processing network used for
          domestic payments.
        US_FEDWIRE: Fedwire Funds Service - U.S. real-time gross settlement network
          for high-value domestic USD transfers.
        MX_SPEI: Mexico's real-time interbank transfer system.
        EU_SEPA: European Union's standardized payment system for euro-denominated
          transactions.
        GB_FPS: Faster Payments Service in the UK for near-instant payments.
        AFRICA_BANK_PAYOUT: Nigeria Bank Payout - A payment method for bank transfers
          in Nigeria.
        BR_PIX: Brazil's instant payment platform developed by the Central Bank of
          Brazil.
        CO_PSE: Colombia's secure online banking payment system.
        BR_TED: Brazil's Electronic Funds Transfer system for high-value transactions.
        CA_EFT: Canada's Electronic Funds Transfer system for batch processing.
      example: BR_PIX
    put-ripple-identity:
      type: object
      description: |
        Request to update an existing identity.
      properties:
        internalId:
          x-requiredByOriginatorFor:
          - ALL
          type: string
          description: |
            Optional client-provided unique identifier for idempotency and deduplication. 
            Must be unique across all active identities within your tenant. Duplicate values will result in a 409 Conflict error.
          example: customer-12345-uuid
        business:
          $ref: '#/components/schemas/business-identity'
        individual:
          $ref: '#/components/schemas/individual-identity'
    financial-instrument-currency:
      type: string
      description: The 3-letter ISO currency code of the financial instrument.
      example: MXN
      x-extensible-enum:
      - AED
      - BRL
      - CAD
      - COP
      - EUR
      - GBP
      - GHS
      - MXN
      - NGN
      - RWF
      - UGX
      - USD
      - ZAR
      - ZMW
      - RLUSD
      - USDC
      - USDT
    financial-instrument-metadata:
      type: object
      description: |
        Metadata information for a financial instrument without the payment rail specific details.
        Used in list operations to provide summary information.
      required:
      - financialInstrumentId
      - financialInstrumentType
      - currency
      properties:
        financialInstrumentId:
          type: string
          description: The unique identifier of the financial instrument.
          example: 3fc74743-e7f3-414a-9fcf-eb8c1d52356a
        financialInstrumentType:
          $ref: '#/components/schemas/financial-instrument-type'
        currency:
          $ref: '#/components/schemas/financial-instrument-currency'
        label:
          type: string
          description: A user-defined label for the financial instrument.
          example: mexico bank account
        country:
          type: string
          description: The country of the financial instrument.
          example: MX
          minLength: 2
          maxLength: 2
          pattern: ^[A-Z]+$
        createdAt:
          type: string
          format: date-time
          description: The time at which the financial instrument was created
          example: '2023-11-02T18:26:00.000Z'
        updatedAt:
          type: string
          format: date-time
          description: The time at which the financial instrument was last updated
          example: '2023-11-03T18:26:00.000Z'
    us-ach:
      type: object
      description: |
        Rails: RTP, ACH

        Rail Definitions:

        RTP:
          - Availability: 24/7/365
          - Limit: $5,000,000
          - Settlement: <5 minutes
          - Cut-off time: None
          - Banking holidays: Not applicable

        ACH:
          - Availability: Business days only
          - Limit: $1,000,000
          - Settlement: Same-day
          - Cut-off time: 3:00 PM EST
          - Banking holidays: U.S. banking holidays apply

        Routing Evaluation Order:

          1. RTP
             - Conditions: beneficiary account is RTP-addressable AND amount ≤ $5,000,000
          2. ACH
             - Conditions: otherwise applicable
      required:
      - bankName
      - bankRoutingNumber
      - accountNumber
      - accountType
      properties:
        bankName:
          type: string
          description: The name of the identity's bank
          minLength: 2
          maxLength: 140
          pattern: ^(?![ .,'&\/()-])(?!.*([ .,'&\/()-])\1)[\p{L}\p{N} .,'&\/()-]+(?<![
            .,'&\/-])?$
        bankRoutingNumber:
          type: string
          description: The identity's bank routing number
          minLength: 9
          maxLength: 9
          pattern: ^\d+$
        accountNumber:
          type: string
          description: The identity's account number into which the funds must be
            credited
          minLength: 4
          maxLength: 21
          pattern: ^\d+$
        accountType:
          type: string
          description: |
            The identity’s account type.

            - `CHECKING` — Checking account  
            - `SAVINGS` — Savings account
    us-fedwire:
      type: object
      description: |
        Rails: FEDWIRE

        Rail Definitions:

        FEDWIRE:
          - Availability: U.S. business days and operating hours.
          - Limit: No limit
          - Settlement: Real-time gross settlement (typically within minutes).
          - Cut-off time: 5:00 p.m. ET; transfers submitted after cut-off queue for next business day.
          - Banking holidays: Follows the Federal Reserve holiday schedule.
      required:
      - bankName
      - bankRoutingNumber
      - accountNumber
      properties:
        bankName:
          type: string
          description: The name of the identity's bank.
          minLength: 2
          maxLength: 140
          pattern: ^(?![ .,'&\/()-])(?!.*([ .,'&\/()-])\1)[\p{L}\p{N} .,'&\/()-]+(?<![
            .,'&\/-])?$
        bankRoutingNumber:
          type: string
          description: 9-digit ABA Routing Transit Number (RTN) of the beneficiary’s
            bank.
          minLength: 9
          maxLength: 9
          pattern: ^\d+$
        accountNumber:
          type: string
          description: The identity's account number to be credited.
          minLength: 4
          maxLength: 21
          pattern: ^\d+$
    mx-spei:
      description: |
        Rails: SPEI

        Rail Definitions:

        SPEI:
        - Availability: 24/7/365
        - Limit: None
        - Settlement: Instant
        - Cut-off time: None
        - Banking holidays: Not applicable

        Routing Evaluation Order: Not applicable
      type: object
      required:
      - bankName
      - clabe
      properties:
        bankName:
          type: string
          description: The name of the identity's bank
          minLength: 2
          maxLength: 140
          pattern: ^(?![ .,'&\/()-])(?!.*([ .,'&\/()-])\1)[\p{L}\p{N} .,'&\/()-]+(?<![
            .,'&\/-])?$
        clabe:
          type: string
          description: The identity's CLABE account identification code
          minLength: 18
          maxLength: 18
          pattern: ^\d+$
    eu-sepa:
      type: object
      description: |
        Rails: SCT Inst, SCT

        Rail Definitions:

        SCT Inst:
        - Availability: 24/7/365
        - Limit: €100,000 (bank-dependent)
        - Settlement: Instant
        - Cut-off time: None
        - Banking holidays: Not applicable

        SCT:
        - Availability: Business days only
        - Limit: No limit
        - Settlement: T+2 to T+5 
        - Cut-off time: 3:00PM GMT/BST
        - Banking holidays: TARGET2 holidays apply

        Routing Evaluation Order:

          1. SCT Inst  
             - Conditions: beneficiary account is SCT Inst-addressable AND amount ≤ €100,000
          2. SCT  
             - Conditions: otherwise applicable
      required:
      - bankName
      - iban
      properties:
        bankName:
          type: string
          description: The name of the identity's bank
          minLength: 2
          maxLength: 140
          pattern: ^(?![ .,'&\/()-])(?!.*([ .,'&\/()-])\1)[\p{L}\p{N} .,'&\/()-]+(?<![
            .,'&\/-])?$
        iban:
          type: string
          description: The International Bank Account Number (IBAN) of the identity's
            account
          minLength: 15
          maxLength: 34
          pattern: ^[A-Z]{2}\d{2}[A-Z0-9]{11,30}$
    gb-fps:
      type: object
      description: |
        Rails: FPS, CHAPS

        Rail Definitions:

        FPS:
        - Availability: 24/7/365
        - Limit: £1,000,000
        - Settlement: Instant
        - Cut-off time: None
        - Banking holidays: Not applicable

        CHAPS:
        - Availability: Business days only
        - Limit: No limit
        - Settlement: Same-day
        - Cut-off time: Typically 5:00 PM GMT/BST (bank-dependent)
        - Banking holidays: UK banking holidays apply

        Routing Evaluation Order:
          1. FPS  
             - Conditions: beneficiary account is FPS-addressable AND amount ≤ £1,000,000
          2. CHAPS  
             - Conditions: otherwise applicable
      required:
      - bankName
      - sortCode
      - accountNumber
      properties:
        bankName:
          type: string
          description: The name of the identity's bank
          minLength: 2
          maxLength: 140
          pattern: ^(?![ .,'&\/()-])(?!.*([ .,'&\/()-])\1)[\p{L}\p{N} .,'&\/()-]+(?<![
            .,'&\/-])?$
        sortCode:
          type: string
          description: The sort code of the identity's bank account
          minLength: 6
          maxLength: 6
          pattern: ^[0-9]+$
        accountNumber:
          type: string
          description: The account number of the identity's bank account
          minLength: 8
          maxLength: 8
          pattern: ^[0-9]+$
    africa-bank-payout:
      type: object
      description: |
        Rails: Bank Payout

        Rail Definitions:

        Bank Payout:
        - Availability: Country-dependant
        - Limit:
          - Ghana: ₵100,000
          - Nigeria: ₦5,000,000
          - Zambia: ZK 150,000
          - Uganda: UGX 20,000
          - Rwanda: RWF 10,000,000
          - South Africa: R 300,000
        - Settlement: Real time to 48 hours
        - Cut-off time: Real time
        - Banking holidays: Country specific banking holidays apply
        - Routing Evaluation Order: Not applicable
      required:
      - bankName
      - bankCode
      - accountNumber
      - country
      properties:
        bankName:
          type: string
          description: The name of the identity's bank
          minLength: 2
          maxLength: 140
          pattern: ^(?![ .,'&\/()-])(?!.*([ .,'&\/()-])\1)[\p{L}\p{N} .,'&\/()-]+(?<![
            .,'&\/-])?$
        bankCode:
          type: string
          description: The bank code of the identity's bank
          minLength: 1
          maxLength: 50
          pattern: ^[A-Za-z0-9 ._-]+$
        accountNumber:
          type: string
          description: The identity's account number associated with the Account Identification
            Scheme
          minLength: 4
          maxLength: 21
          pattern: ^[a-zA-Z0-9]+$
        country:
          type: string
          description: |
            The country of the identity’s bank, using the Alpha-2 code as defined in ISO 3166-1.  
            Allowed values are:

            - `GH`  
            - `NG`  
            - `RW`  
            - `UG`  
            - `ZA`  
            - `ZM`
          example: NG
    br-pix:
      description: |
        Rails: PIX

        Rail Definitions:

        PIX:
        - Availability: 24/7/365
        - Limit: No limit
        - Settlement: Instant
        - Cut-off time: None
        - Banking holidays: Not applicable

        Routing Evaluation Order: Not applicable
      type: object
      required:
      - bankName
      - bankCode
      - branchNumber
      - pixKey
      - pixKeyType
      properties:
        bankName:
          type: string
          description: The name of the identity's bank
          minLength: 2
          maxLength: 140
          pattern: ^(?![ .,'&\/()-])(?!.*([ .,'&\/()-])\1)[\p{L}\p{N} .,'&\/()-]+(?<![
            .,'&\/-])?$
        bankCode:
          type: string
          description: The code of the identity's bank (BICFI code)
          minLength: 8
          maxLength: 11
          pattern: ^[A-Za-z0-9]+$
        branchNumber:
          type: string
          description: The identity's bank branch number
          minLength: 4
          maxLength: 6
          pattern: ^\d{4}(-?[0-9X])?$
        pixKey:
          type: string
          description: The identity's PIX key, which can be an email, phone number,
            or a hash
          minLength: 6
          maxLength: 77
          pattern: (?x) ^( \+[1-9]\d{7,15}$ | [\p{L}\p{N}._%+\-]+@[\p{L}\p{N}.\-]+\.[\p{L}]{2,}
            | [0-9A-Fa-f]{8}-[0-9A-Fa-f]{4}-[0-9A-Fa-f]{4}- [0-9A-Fa-f]{4}-[0-9A-Fa-f]{12}
            | \d{11} | \d{14} | \d{3}\.\d{3}\.\d{3}-\d{2} | \d{2}\.\d{3}\.\d{3}\/\d{4}-\d{2}
            )$
        pixKeyType:
          type: string
          description: |
            The type of PIX key used by the identity.

            - `CPF`  
            - `CNPJ`  
            - `EMAIL`  
            - `PHONE`  
            - `EVP`
    co-pse:
