        bankCode:
          type: string
          description: The identity's bank identifier code
          minLength: 2
          maxLength: 4
          pattern: ^\d+$
        accountNumber:
          type: string
          description: The identity's account number associated with the Account Identification
            Scheme
          minLength: 1
          maxLength: 20
          pattern: ^\d+$
        accountType:
          type: string
          description: |
            The type of account associated with the identity.

            - `CURRENT`  
            - `SAVINGS`
    br-ted:
      type: object
