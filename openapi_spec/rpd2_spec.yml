openapi: 3.0.3
info:
  title: Payments Direct API
  version: 2026.03
  license:
    name: Apache 2.0
    url: http://apache.org
  description: |
    Use the Payments Direct API to get quotes, create and manage payments, and manage originator and beneficiary identities.

    ## API environments

    The Payments Direct API offers the following environments:

    | <div style="width:90px">Environment</div>  | Base URL                      | Description                               |
    | ------------------------------------------ | ----------------------------- | ----------------------------------------- |
    | UAT                                       | `https://api.test.ripple.com` | UAT environment with simulated currency. |
    | Production                                 | `https://api.ripple.com`      | Production environment                    |

    ## API authentication

    All {{process.env.VAR_RPD}} API operations require a Bearer access token specific to the environment you're using. Ripple provides a secure model for authentication and authorization by providing access tokens scoped for a set of credentials.

    ### Generate client ID and client secret

    You will need your _client ID_ and _client secret_ to obtain an access token.

    If you do not already have your client ID and client secret, do the following:

    1. Log into the Ripple Payments UI.
    2. In the left navigation menu, click **Settings**.
    3. Under **Administration**, click **API Credentials**.
    4. In the dropdown list next to the page title, select the access environment. For example, to provision credentials for the test environment, select **UAT** from the dropdown list.
    5. In the upper right corner of the page, click **New Credential**.
    6. Click **Save and Generate Key**.

    **Caution:** The *client secret* is displayed only once when you are creating new credentials. You cannot retrieve the secret after exiting this page. Copy and store the client secret securely and share it with authorized individuals in accordance with your organization's security policy.

    You can now use the client ID and client secret to generate access tokens using the [Request an access token](/api-docs/payments-direct-api/reference/#operation/authenticate) operation.

    ### Request an access token

    To get an access token, use the [Request an access token](/products/payments-direct-2/api-docs/payments-direct-api/payments-direct-2-api/authentication/authenticate) operation with your `client_id` and `client_secret`. The response contains a token in the `access_token` field.

    We recommend rotating your API credentials at regular intervals according to your organization's security policy.

    **Note**: Authentication tokens are not a fixed length and can vary, avoid validating tokens based on character length.
servers:
- url: https://api.test.ripple.com
  description: UAT environment with simulated currency
- url: https://api.ripple.com
  description: Production environment
tags:
- name: Authentication
  description: |
    Use these API operations to manage your authentication tokens.

    | Operation | Method | Description |
    | --- | --- | --- |
    | [Request an access token](#operation/authenticate) | POST | Request an access token for authentication with Ripple APIs. |
    | [Test access token](#operation/testAuthToken) | GET | Test if an access token can be used for authentication. |
  x-displayName: Authentication
- name: IdentitiesV3
  x-displayName: Identities (v3)
  description: |
    Use these API operations to manage your identities with **Identity Management v3** (recommended for all new integrations).

    | Operation | Method | Description |
    | --- | --- | --- |
    | [Create an identity (v3)](./#operation/createIdentity) | POST | Create a new identity (INDIVIDUAL/BUSINESS; ORIGINATOR/BENEFICIARY). |
    | [Get a list of identies (v3)](./#operation/getIdentities) | GET | Retrieve a list of identities with optional filters (e.g., `paymentRole`, `identityType`). |
    | [Get an identity by ID (v3)](./#operation/getIdentityById) | GET | Retrieve a specific identity by `identityId` (latest version by default). |
    | [Update an identity (v3)](./#operation/patchIdentity) | PUT | Update one or more fields; creates a new version. |
    | [Deactivate an identity (v3)](./#operation/deactivateIdentity) | DELETE | Set the identity state to `DEACTIVATED` (cannot be used for new payments). |
    | [Add a financial instrument (v3)](./#operation/addFinancialInstrument) | POST | Add a financial instrument to an identity. |
    | [Get a list of financial instruments (v3)](./#operation/getFinancialInstruments) | GET | Get a list of financial instruments for an identity. |
    | [Get a financial instrument by ID (v3)](./#operation/getFinancialInstrumentById) | GET | Get a specific financial instrument by `financialInstrumentId`. |
    | [Update a financial instrument (v3)](./#operation/updateFinancialInstrument) | PUT | Update a financial instrument by `financialInstrumentId`. |
    | [Deactivate a financial instrument (v3)](./#operation/deactivateFinancialInstrument) | DELETE | Deactivate a financial instrument by `financialInstrumentId`. |
- name: Quote
  x-displayName: Quotes
  description: |
    Use these API operations to manage your quotes.

    | Operation | Method | Description |
    | --- | --- | --- |
    | [Create quote collection](./#operation/createQuoteCollection) | POST | Create a collection of quotes.  |
    | [Get quote collection](./#operation/getQuoteCollection) | GET | Get a quote collection by ID. |
    | [Get a quote](./#operation/getQuote) | GET | Get a specific quote by ID.  |
- name: PaymentsV2
  x-displayName: Payments (v3)
  description: |
    Use these API operations to manage your payments with **Payment Management v3** (recommended for all new integrations).

    | Operation | Method | Description |
    | --- | --- | --- |
    | [Search payments (v3)](./#operation/searchPaymentsV2) | POST | Search for v3 payments based on filtering criteria. |
    | [Create a payment (v3)](./#operation/createPaymentV2) | POST | Create a v3payment by accepting a quote. |
    | [Get payment by payment ID (v3)](./#operation/getPaymentByIdV2) | GET | Get a specific v3 payment by payment ID.  |
    | [Get state transitions by payment ID (v3)](./#operation/getPaymentStateTransitionsByIdV2) | GET | Get the state transitions for a specific v3 payment by payment ID. |
    | [Update payment labels (v3)](./#operation/updatePaymentLabelsV2) | PATCH | Update the labels for a specific v3 payment by payment ID. |
- name: ledger-public
  x-displayName: Ledger
  description: |
    Use these API operation to fetch ledger transactions and check balances.

    | Operation | Method | Description |
    | --- | --- | --- |
    | [Get balances](./#operation/getBalances) | GET | View your existing balances  |
    | [Get ledger transactions](./#operation/getStatementsTransactionsForCustomer) | GET | View your ledger transactions.  |
paths:
  /v2/oauth/token:
    post:
      tags:
      - Authentication
      operationId: authenticate
      summary: Request an access token
      parameters:
      - in: header
        name: Authorization
        required: false
        schema:
          type: string
          description: Optional [base64-encoded](https://datatracker.ietf.org/doc/html/rfc7617)
            `client_id:client_secret`. If provided here they aren't required in the
            request body.
          example: Basic ZGVtbzpwQDU1dzByZA==
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthenticationRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AuthenticationRequest'
      responses:
        '200':
          description: Returns the authentication response object that includes the
            token, type, scopes, and expiry.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthenticationResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error_description: 'Missing required parameter: grant_type'
                error: invalid_request
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error_description: Unauthorized
                error: access_denied
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error_description: 'Service not enabled within domain: <wrong:domain>'
                error: access_denied
      description: |
        Request an access token for authentication with Ripple APIs.

        You need to request a token for the environment you want to authenticate with.

        **Note**: The length of the access token isn't fixed, hence it can vary. Avoid validating tokens based on character length.

        **Tutorials**

        * Learn how to [Request an access token](../../tutorials/request-an-access-token/).

        #### Environments

        | Environment | Domain | Description |
        | --- | --- | --- |
        | Test | `api.test.ripple.com` | Test environment with simulated currency. |
        | Production | `api.ripple.com` | Production environment for Ripple Payments Direct |
      security:
      - BasicAuth: []
  /v2/oauth/token/test:
    get:
      tags:
      - Authentication
      operationId: testAuthToken
      security:
      - Bearer: []
      summary: Test access token
      description: Test if an access token can be used for authentication with Ripple
        APIs and how much time remains on it.
      responses:
        '200':
          description: If a valid bearer token is supplied, the time remaining before
            the token expires is returned.
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/ValidateTokenResponse'
                type: array
        '400':
          description: Bad Request
          content:
            text/plain:
              schema:
                type: string
              example: Invalid Request parameters [Invalid bearer authentication token]
        '401':
          description: Unauthorized
  /v3/payments/filter:
    post:
      tags:
      - PaymentsV2
      security:
      - Bearer: []
      operationId: searchPaymentsV2
      summary: Search payments (v3)
      description: Search for payments based on filtering criteria.
      requestBody:
        description: Search payments request
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SearchPaymentsRequestV2'
      responses:
        '200':
          description: Payments matching the specified filtering criteria.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentsResponseV2'
        '400':
          description: Invalid input variables for the request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentErrorResponse'
              example:
                status: 400
                errors:
                  code: USR_001
                  type: USER_VALIDATION_ERROR
                  title: Bad Request
                  description: Invalid request. Check your request parameters and
                    try again.
                  timestamp: '2024-12-01T12:00:00Z'
        '500':
          description: Internal processing error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentErrorResponse'
              example:
                status: 500
                errors:
                  code: SYS_001
                  type: SYSTEM_ERROR
                  title: Internal Server Error
                  description: Unable to process the request due to an internal server
                    error.
                  timestamp: '2024-12-01T12:00:00Z'
  /v3/payments:
    post:
      tags:
      - PaymentsV2
      security:
      - Bearer: []
      operationId: createPaymentV2
      summary: Create payment (v3)
      description: |
        Create a payment

        **Tutorial**

        * Learn how to [Create a payment](/products/payments-direct-2/api-docs/tutorials/create-a-payment/).
      requestBody:
        description: create payment request
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentRequestV2'
      responses:
        '201':
          description: Valid payment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentV2'
        '400':
          description: Invalid input variables for the payment.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentErrorResponse'
              example:
                status: 400
                errors:
                  code: USR_001
                  type: USER_VALIDATION_ERROR
                  title: Bad Request
                  description: Invalid request. Check your request parameters and
                    try again.
                  timestamp: '2024-12-01T12:00:00Z'
        '402':
          description: Problems related to payment limits.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentErrorResponse'
              example:
                status: 402
                errors:
                  code: USR_067
                  type: USER_ERROR
                  title: Insufficient balance
                  description: Payment failed due to insufficient balance. Add funds
                    to your account and try again.
                  timestamp: '2024-12-01T12:00:00Z'
        '500':
          description: Internal processing error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentErrorResponse'
              example:
                status: 500
                errors:
                  code: SYS_001
                  type: SYSTEM_ERROR
                  title: Internal Server Error
                  description: Unable to process the request due to an internal server
                    error.
                  timestamp: '2024-12-01T12:00:00Z'
  /v3/payments/{paymentId}:
    get:
      tags:
      - PaymentsV2
      security:
      - Bearer: []
      operationId: getPaymentByIdV2
      description: Gets a payment by ID.
      summary: Get a payment by ID (v3)
      parameters:
      - in: path
        name: paymentId
        description: Unique identifier of the payment to get.
        example: 7ea3399c-1234-5678-8d8f-d320ea406630
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Successfully fetched payment details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentWithDetailsV2'
        '400':
          description: Invalid input variables for the payment.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentErrorResponse'
              example:
                status: 400
                errors:
                  code: USR_001
                  type: USER_VALIDATION_ERROR
                  title: Bad Request
                  description: Invalid request. Check your request parameters and
                    try again.
                  timestamp: '2024-12-01T12:00:00Z'
        '404':
          description: Payment not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentErrorResponse'
              example:
                status: 404
                errors:
                  code: USR_002
                  type: NOT_FOUND
                  title: Resource Not Found
                  description: The requested resource could not be found.
                  timestamp: '2024-12-01T12:00:00Z'
        '500':
          description: Internal processing error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentErrorResponse'
              example:
                status: 500
                errors:
                  code: SYS_001
                  type: SYSTEM_ERROR
                  title: Internal Server Error
                  description: Unable to process the request due to an internal server
                    error.
                  timestamp: '2024-12-01T12:00:00Z'
  /v3/payments/{paymentId}/states:
    get:
      tags:
      - PaymentsV2
      security:
      - Bearer: []
      operationId: getPaymentStateTransitionsByIdV2
      description: Gets the state transitions for a payment by ID.
      summary: Get state transitions by payment ID (v3)
      parameters:
      - in: path
        name: paymentId
        description: Unique identifier of the payment for which you want to get state
          transition information.
        example: 7ea3399c-1234-5678-8d8f-d320ea406630
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Successfully fetched payment state transitions.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StateTransitionsResponseV2'
        '400':
          description: Invalid input variables for the payment.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentErrorResponse'
              example:
                status: 400
                errors:
                  code: USR_001
                  type: USER_VALIDATION_ERROR
                  title: Bad Request
                  description: Invalid request. Check your request parameters and
                    try again.
                  timestamp: '2024-12-01T12:00:00Z'
        '404':
          description: Payment not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentErrorResponse'
              example:
                status: 404
                errors:
                  code: USR_002
                  type: NOT_FOUND
                  title: Resource Not Found
                  description: The requested resource could not be found.
                  timestamp: '2024-12-01T12:00:00Z'
        '500':
          description: Internal processing error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentErrorResponse'
              example:
                status: 500
                errors:
                  code: SYS_001
                  type: SYSTEM_ERROR
                  title: Internal Server Error
                  description: Unable to process the request due to an internal server
                    error.
                  timestamp: '2024-12-01T12:00:00Z'
  /v3/payments/{paymentId}/labels:
    patch:
      tags:
      - PaymentsV2
      security:
      - Bearer: []
      operationId: updatePaymentLabelsV2
      summary: Update payment labels (v3)
      description: Add or remove labels for a payment.
      parameters:
      - in: path
        name: paymentId
        description: The unique ID that identifies the payment for which you want
          to update labels.
        example: 7ea3399c-1234-5678-8d8f-d320ea406630
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        description: Labels to add to or remove from the payment.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePaymentLabelsRequest'
      responses:
        '200':
          description: Successfully updated the payment labels.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdatePaymentLabelsResponse'
        '400':
          description: Invalid input variables for the request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentErrorResponse'
              example:
                status: 400
                errors:
                  code: USR_001
                  type: USER_VALIDATION_ERROR
                  title: Bad Request
                  description: Invalid request. Check your request parameters and
                    try again.
                  timestamp: '2024-12-01T12:00:00Z'
        '404':
          description: Payment not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentErrorResponse'
              example:
                status: 404
                errors:
                  code: USR_002
                  type: NOT_FOUND
                  title: Resource Not Found
                  description: The requested resource could not be found.
                  timestamp: '2024-12-01T12:00:00Z'
        '500':
          description: Internal processing error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentErrorResponse'
              example:
                status: 500
                errors:
                  code: SYS_001
                  type: SYSTEM_ERROR
                  title: Internal Server Error
                  description: Unable to process the request due to an internal server
                    error.
                  timestamp: '2024-12-01T12:00:00Z'
  /v3/identities:
    post:
      tags:
      - IdentitiesV3
      security:
      - Bearer: []
      operationId: createIdentity
      summary: Create an identity (v3)
      description: |
        Create a new payment identity as an ORIGINATOR or BENEFICIARY for either an INDIVIDUAL or BUSINESS.
        The request body must follow the v3 identity schema and will be validated against corridor rules where applicable.
        On success, the API returns the new identityId and its initial version.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/create-identity-request-v3'
            examples:
              create-individual-originator:
                summary: INDIVIDUAL ORIGINATOR
                value:
                  identityType: INDIVIDUAL
                  paymentRole: ORIGINATOR
                  nickName: Alice Sender USD
                  tags:
                  - sender
                  - priority
                  individual:
                    firstName: Alice
                    lastName: Chen
                    dateOfBirth: '1990-05-14'
                    citizenship: US
                    address:
                      streetAddress:
                      - 123 Main Street
                      city: San Francisco
                      stateOrProvince: CA
                      postalCode: '94105'
                      country: US
              create-business-beneficiary:
                summary: BUSINESS BENEFICIARY
                value:
                  identityType: BUSINESS
                  paymentRole: BENEFICIARY
                  nickName: Widgets Org MX
                  tags:
                  - beneficiary
                  - mx
                  business:
                    businessName: Widgets Org
                    incorporationCountry: US
                    registration:
                    - number: 123ABC
                      type: INCORPORATION_CERTIFICATE
                    email: fake@example.com
                    phone: '+1234567890'
                    address:
                      streetAddress:
                      - 123 Example MA
                      city: Boston
                      stateOrProvince: MS
                      postalCode: '12345'
                      country: US
      responses:
        '201':
          description: Identity created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/create-identity-response-v3'
              example:
                identityId: 99254c4f-f207-4792-a846-06928825018c
                version: '1'
        '400':
          description: Invalid request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error-response'
              examples:
                error-response-400:
                  $ref: '#/components/examples/error-400-example'
        '409':
          description: Conflict - An identity with the provided internalId already
            exists.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error-response'
        '500':
          description: Internal processing error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error-response'
              examples:
                error-response-500:
                  $ref: '#/components/examples/error-500-example'
    get:
      tags:
      - IdentitiesV3
      security:
      - Bearer: []
      operationId: getIdentities
      summary: Get a list of identities (v3)
      description: |
        Retrieve identities for your tenant with optional filters.
        Use `limit` and `next-token` for pagination. The response includes a `data` array and an optional `nextToken`.
      parameters:
      - in: query
        name: payment-role
        required: false
        schema:
          type: string
        example: BENEFICIARY
        description: Filter by payment role.
      - in: query
        name: nick-name
        required: false
        schema:
          type: string
          maxLength: 256
        example: Alice
        description: Filter by nickname.
      - in: query
        name: limit
        required: false
        schema:
          type: integer
          minimum: 1
          example: 20
          default: 10
        description: Maximum number of identities to return. Default value is 10,
          maximum is 100.
      - in: query
        name: next-token
        required: false
        schema:
          type: string
        example: eyJrZXkxIjoidmFsdWVfMSIsImtleTIiOiJ2YWx1ZTIifQ==
        description: Opaque token to fetch the next page of results.
      responses:
        '200':
          description: A page of identities.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/list-identities-response-v3'
              examples:
                list-identities-v3:
                  value:
                    data:
                    - identityId: 0116bacc-ffbf-4fa2-a29c-ecd9ea346806
                      identityType: BUSINESS
                      paymentRole: BENEFICIARY
                      createdAt: '2025-10-01T16:14:13.200Z'
                      updatedAt: '2025-10-01T16:14:15.763Z'
                      identityState: ACTIVE
                      nickName: testNickName
                      tags:
                      - tag1
                      version: 2
                      schemaVersion: 1.0.0
                    - identityId: 1d927c62-45fa-4f42-b9f8-8210e1a111bb
                      identityType: INDIVIDUAL
                      paymentRole: ORIGINATOR
                      createdAt: '2025-10-01T17:20:05.111Z'
                      updatedAt: '2025-10-01T17:20:06.500Z'
                      identityState: ACTIVE
                      nickName: Alice Originator
                      tags:
                      - sender
                      - priority
                      version: 1
                      schemaVersion: 1.0.0
                    nextToken: eyJrZXkxIjoidmFsdWUifQ==
        '400':
          description: Invalid request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error-response'
              examples:
                error-response-400:
                  $ref: '#/components/examples/error-400-example'
        '404':
          description: No identities found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error-response'
              examples:
                error-response-404:
                  $ref: '#/components/examples/error-404-example'
        '500':
          description: Internal processing error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error-response'
              examples:
                error-response-500:
                  $ref: '#/components/examples/error-500-example'
  /v3/identities/{identity-id}:
    get:
      tags:
      - IdentitiesV3
      security:
      - Bearer: []
      operationId: getIdentityById
      summary: Get an identity by ID (v3)
      description: |
        Retrieve a specific identity by ID.
        If `version` is not provided, the latest version is returned.
      parameters:
      - name: identity-id
        in: path
        required: true
        description: The ID of the identity to retrieve.
        example: 2f4ac57f-c5ba-4051-b51f-b3565778717b
        schema:
          type: string
      - in: query
        name: version
        description: Specific version to retrieve. If omitted, returns the latest
          version.
        example: '2'
        required: false
        schema:
          type: string
      responses:
        '200':
          description: Identity details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/get-identity-response-v3'
              examples:
                get-identity-v3:
                  value:
                    identityId: 9d839f58-7fd3-4913-a27e-48d31973d3f9
                    identityState: ACTIVE
                    nickName: nickName
                    tags:
                    - tag1
                    version: '2'
                    schemaVersion: 1.0.0
                    createdAt: '2025-10-01T18:46:41.833Z'
                    updatedAt: '2025-10-01T18:46:47.430Z'
                    identityType: BUSINESS
                    paymentRole: BENEFICIARY
                    business:
                      businessName: Widgets Org
                      address:
                        streetAddress:
