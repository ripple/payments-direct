  /v2/ledger-transactions:
    get:
      summary: Get ledger transactions
      operationId: getStatementsTransactionsForCustomer
      tags:
      - ledger-public
      description: |
        Retrieve a paginated list of ledger transactions for your tenant within a specified date and time range. This endpoint returns detailed transaction data, including amounts, references, operations, and running balances, so you can reconcile balance changes over time for a given currency.
      parameters:
      - name: currency
        in: query
        required: true
        schema:
          type: string
        description: |
          Three-letter ISO 4217 currency code for the transactions to return (for example, USD).
        example: USD
      - name: start-dttm
        in: query
        required: true
        schema:
          type: string
          format: date-time
        description: |
          Start of the date and time range (inclusive), in UTC, for which you want to retrieve ledger transactions.
        example: '2022-02-27T08:30:00Z'
      - name: end-dttm
        in: query
        required: true
        schema:
          type: string
          format: date-time
        description: |
          End of the date and time range (exclusive), in UTC, for which you want to retrieve ledger transactions.
        example: '2022-02-27T08:30:00Z'
      - name: status
        in: query
        required: false
        schema:
          type: string
        description: |
          Filter results by transaction status. Allowed values: - SUCCESS: the ledger transaction completed successfully. - PENDING: reserved for future use to represent an in-flight ledger transaction.
      - name: txnReference
        in: query
        required: false
        schema:
          type: string
        description: |
          Filter results by an exact transaction reference. Use this to locate all ledger transactions associated with a specific external reference.
      - name: page-size
        in: query
        required: true
        schema:
          type: integer
          default: 25
          minimum: 1
          maximum: 50
        description: |
          Number of records to return in the response page. Use page-size together with offset for offset-based pagination
      - name: offset
        in: query
        required: false
        schema:
          type: integer
        description: |
          Number of records to skip before starting to return results. Use this with page-size to implement offset-based pagination.
          For example, `offset=25&page-size=25` returns the second page of results.
      - name: sort-key
        in: query
        required: false
        schema:
          type: string
        description: |
          Field to use for sorting the results. Allowed values include: 
          - `CREATED_AT`: sort by transaction creation timestamp. 
          - `STATEMENT_OPERATION`: sort by the operation type (for example, CREDIT, DEBIT). 
          - `STATEMENT_SOURCE`: sort by the transaction source (for example, PAYMENTS, BANK). 
          - `STATEMENT_STATUS`: sort by the ledger transaction status. 
          - `STATEMENT_TXN_REFERENCE`: sort by the transaction reference. 
          - `STATEMENT_UPDATED_AT`: sort by the last update timestamp.
      - name: sort-direction
        in: query
        required: false
        schema:
          type: string
        description: |
          Sort direction. Allowed values: 
          - `ASC`: ascending order. 
          - `DESC`: descending order.
      responses:
        '200':
          description: |
            A page of ledger statement transactions for the tenant that match the specified query parameters.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  description: A page of ledger statement transactions and pagination
                    metadata.
                  properties:
                    offset:
                      type: integer
                      description: |
                        Offset used in the request to skip a specific number of records.
                      example: 0
                    pageSize:
                      type: integer
                      description: Number of records requested per page
                      example: 25
                    pageElements:
                      type: integer
                      description: Number of records returned in requested page
                      example: 25
                    total:
                      type: integer
                      format: int64
                      description: Total number of records available for the given
                        filters.
                      example: 1000
                    statementTransactions:
                      type: array
                      description: Statement transaction details for the tenant.
                      items:
                        type: object
                        properties:
                          tenant:
                            type: string
                            description: Identifier of the tenant that owns this ledger
                              transaction.
                            example: rocketfuel
                          amount:
                            type: number
                            description: |
                              Amount of the transaction applied to the tenant’s ledger account.
                            example: 100
                          currency:
                            type: string
                            description: Three-letter ISO 4217 currency code of the
                              transaction.
                            example: USD
                          operation:
                            type: string
                            description: |
                              Operation performed on the tenant’s prefunded ledger account.
                            x-enumDescriptions:
                              CREDIT: Credit to the ledger account.
                              RESERVE: Funds reserved in an intermediate state.
                              DEBIT: Funds debited from the reserved state.
                              RELEASE: Reserved funds released back to the account.
                              VOID_PREFUND_BALANCE: Prefund balance has been voided.
                                [Deprecated]
                              OVERRIDE_PREFUND_BALANCE: Prefund balance has been overridden.
                                [Deprecated]
                              VOID_BALANCE: Balance has been voided.
                              OVERRIDE_BALANCE: Balance has been overridden.
                          txnSource:
                            type: string
                            description: |
                              Source of the ledger transaction (for example, which system or flow created it).
                            x-enumDescriptions:
                              PAYMENTS: Created by a payments flow.
                              BANK: Created by a bank transaction.
                              POSTED_PAYMENT: Created by a posted payment operation.
                              CREDIT_MEMO: Created by a credit memo.
                              MANUAL: Created manually via API.
                          status:
                            type: string
                            description: State of the ledger transaction.
                            x-enumDescriptions:
                              SUCCESS: Ledger transaction completed successfully.
                              PENDING: Reserved for future use to represent an in-flight
                                ledger transaction.
                          createdDttm:
                            type: string
                            format: date-time
                            nullable: false
                            description: Timestamp (UTC) when the ledger transaction
                              was created.
                            example: '2024-06-01T00:00:00.000000Z'
                          updatedDttm:
                            type: string
                            format: date-time
                            nullable: false
                            description: Timestamp (UTC) when the ledger transaction
                              was last updated.
                            example: '2024-06-01T00:00:00.000000Z'
                          availableBalanceBefore:
                            type: number
                            description: |
                              Available ledger account balance (in the transaction currency) immediately before this transaction was applied.
                            example: 100
                          availableBalanceAfter:
                            type: number
                            description: |
                              Available ledger account balance (in the transaction currency) immediately after this transaction was applied.
                            example: 90
