        Routing Evaluation Order: Not applicable
      required:
      - bankName
      - bankCode
      - branchNumber
      - accountNumber
      - accountType
      properties:
        bankName:
          type: string
          description: The name of the identity's bank
          minLength: 2
          maxLength: 140
          pattern: ^(?![ .,'&\/()-])(?!.*([ .,'&\/()-])\1)[\p{L}\p{N} .,'&\/()-]+(?<![
            .,'&\/-])?$
        bankCode:
          type: string
          description: The code of the identity's bank (BICFI code)
          minLength: 8
          maxLength: 11
          pattern: ^[A-Za-z0-9]+$
        branchNumber:
          type: string
          description: The branch number of the identity's bank account
          minLength: 4
          maxLength: 6
          pattern: ^\d{4}(-?[0-9X])?$
        accountNumber:
          type: string
          description: The identity's account number associated with the Account Identification
            Scheme
          minLength: 5
          maxLength: 14
          pattern: ^\d+$
        accountType:
