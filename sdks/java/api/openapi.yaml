        businessName:
          description: Business Legal Name
          example: Widgets Org
          maxLength: 140
          minLength: 1
          pattern: "^(?![ .,'&\\/()-])(?!.*([ .,'&\\/()-])\\1)[\\p{L}\\p{N} .,'&\\\
            /()-]+(?<![ .,'&\\/-])?$"
