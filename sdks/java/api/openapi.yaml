          description: The time at which the financial instrument was created
          example: 2023-11-02T18:26:00Z
          format: date-time
          type: string
        updatedAt:
          description: The time at which the financial instrument was last updated
          example: 2023-11-03T18:26:00Z
          format: date-time
          type: string
      required:
      - currency
      - financialInstrumentId
      - financialInstrumentType
      type: object
    us-ach:
      description: |
        Rails: RTP, ACH

        Rail Definitions:

        RTP:
          - Availability: 24/7/365
          - Limit: $5,000,000
          - Settlement: <5 minutes
          - Cut-off time: None
          - Banking holidays: Not applicable

        ACH:
          - Availability: Business days only
          - Limit: $1,000,000
          - Settlement: Same-day
          - Cut-off time: 3:00 PM EST
          - Banking holidays: U.S. banking holidays apply

        Routing Evaluation Order:

          1. RTP
             - Conditions: beneficiary account is RTP-addressable AND amount ≤ $5,000,000
          2. ACH
             - Conditions: otherwise applicable
      example:
        bankRoutingNumber: bankRoutingNumber
        accountType: accountType
        bankName: bankName
        accountNumber: accountNumber
      properties:
        bankName:
          description: The name of the identity's bank
          maxLength: 140
          minLength: 2
          pattern: "^(?![ .,'&\\/()-])(?!.*([ .,'&\\/()-])\\1)[\\p{L}\\p{N} .,'&\\\
            /()-]+(?<![ .,'&\\/-])?$"
          type: string
        bankRoutingNumber:
          description: The identity's bank routing number
          maxLength: 9
          minLength: 9
          pattern: ^\d+$
          type: string
        accountNumber:
          description: The identity's account number into which the funds must be
            credited
          maxLength: 21
          minLength: 4
          pattern: ^\d+$
          type: string
        accountType:
          description: "The identity’s account type.\n\n- `CHECKING` — Checking account\
            \  \n- `SAVINGS` — Savings account\n"
          type: string
      required:
      - accountNumber
      - accountType
      - bankName
      - bankRoutingNumber
      type: object
    us-fedwire:
      description: |
        Rails: FEDWIRE

        Rail Definitions:

        FEDWIRE:
          - Availability: U.S. business days and operating hours.
          - Limit: No limit
          - Settlement: Real-time gross settlement (typically within minutes).
          - Cut-off time: 5:00 p.m. ET; transfers submitted after cut-off queue for next business day.
          - Banking holidays: Follows the Federal Reserve holiday schedule.
      example:
        bankRoutingNumber: bankRoutingNumber
        bankName: bankName
        accountNumber: accountNumber
      properties:
        bankName:
          description: The name of the identity's bank.
          maxLength: 140
          minLength: 2
          pattern: "^(?![ .,'&\\/()-])(?!.*([ .,'&\\/()-])\\1)[\\p{L}\\p{N} .,'&\\\
            /()-]+(?<![ .,'&\\/-])?$"
          type: string
        bankRoutingNumber:
          description: 9-digit ABA Routing Transit Number (RTN) of the beneficiary’s
            bank.
          maxLength: 9
          minLength: 9
          pattern: ^\d+$
          type: string
        accountNumber:
          description: The identity's account number to be credited.
          maxLength: 21
          minLength: 4
          pattern: ^\d+$
          type: string
      required:
      - accountNumber
      - bankName
      - bankRoutingNumber
      type: object
    mx-spei:
      description: |
        Rails: SPEI

        Rail Definitions:

        SPEI:
        - Availability: 24/7/365
        - Limit: None
        - Settlement: Instant
        - Cut-off time: None
        - Banking holidays: Not applicable

        Routing Evaluation Order: Not applicable
      example:
        bankName: bankName
        clabe: clabe
      properties:
        bankName:
          description: The name of the identity's bank
          maxLength: 140
          minLength: 2
          pattern: "^(?![ .,'&\\/()-])(?!.*([ .,'&\\/()-])\\1)[\\p{L}\\p{N} .,'&\\\
            /()-]+(?<![ .,'&\\/-])?$"
          type: string
        clabe:
          description: The identity's CLABE account identification code
          maxLength: 18
          minLength: 18
          pattern: ^\d+$
          type: string
      required:
      - bankName
      - clabe
      type: object
    eu-sepa:
      description: "Rails: SCT Inst, SCT\n\nRail Definitions:\n\nSCT Inst:\n- Availability:\
        \ 24/7/365\n- Limit: €100,000 (bank-dependent)\n- Settlement: Instant\n- Cut-off\
        \ time: None\n- Banking holidays: Not applicable\n\nSCT:\n- Availability:\
        \ Business days only\n- Limit: No limit\n- Settlement: T+2 to T+5 \n- Cut-off\
        \ time: 3:00PM GMT/BST\n- Banking holidays: TARGET2 holidays apply\n\nRouting\
        \ Evaluation Order:\n\n  1. SCT Inst  \n     - Conditions: beneficiary account\
        \ is SCT Inst-addressable AND amount ≤ €100,000\n  2. SCT  \n     - Conditions:\
        \ otherwise applicable\n"
      example:
        iban: iban
        bankName: bankName
      properties:
        bankName:
          description: The name of the identity's bank
          maxLength: 140
          minLength: 2
          pattern: "^(?![ .,'&\\/()-])(?!.*([ .,'&\\/()-])\\1)[\\p{L}\\p{N} .,'&\\\
            /()-]+(?<![ .,'&\\/-])?$"
          type: string
        iban:
          description: The International Bank Account Number (IBAN) of the identity's
            account
          maxLength: 34
          minLength: 15
          pattern: "^[A-Z]{2}\\d{2}[A-Z0-9]{11,30}$"
          type: string
      required:
      - bankName
      - iban
      type: object
    gb-fps:
      description: "Rails: FPS, CHAPS\n\nRail Definitions:\n\nFPS:\n- Availability:\
        \ 24/7/365\n- Limit: £1,000,000\n- Settlement: Instant\n- Cut-off time: None\n\
        - Banking holidays: Not applicable\n\nCHAPS:\n- Availability: Business days\
        \ only\n- Limit: No limit\n- Settlement: Same-day\n- Cut-off time: Typically\
        \ 5:00 PM GMT/BST (bank-dependent)\n- Banking holidays: UK banking holidays\
        \ apply\n\nRouting Evaluation Order:\n  1. FPS  \n     - Conditions: beneficiary\
        \ account is FPS-addressable AND amount ≤ £1,000,000\n  2. CHAPS  \n     -\
        \ Conditions: otherwise applicable\n"
      example:
        bankName: bankName
        accountNumber: accountNumber
        sortCode: sortCode
      properties:
        bankName:
          description: The name of the identity's bank
          maxLength: 140
          minLength: 2
          pattern: "^(?![ .,'&\\/()-])(?!.*([ .,'&\\/()-])\\1)[\\p{L}\\p{N} .,'&\\\
            /()-]+(?<![ .,'&\\/-])?$"
          type: string
        sortCode:
          description: The sort code of the identity's bank account
          maxLength: 6
          minLength: 6
          pattern: "^[0-9]+$"
          type: string
        accountNumber:
          description: The account number of the identity's bank account
          maxLength: 8
          minLength: 8
          pattern: "^[0-9]+$"
          type: string
      required:
      - accountNumber
      - bankName
      - sortCode
      type: object
    africa-bank-payout:
      description: |
        Rails: Bank Payout

        Rail Definitions:

        Bank Payout:
        - Availability: Country-dependant
        - Limit:
          - Ghana: ₵100,000
          - Nigeria: ₦5,000,000
          - Zambia: ZK 150,000
          - Uganda: UGX 20,000
          - Rwanda: RWF 10,000,000
          - South Africa: R 300,000
        - Settlement: Real time to 48 hours
        - Cut-off time: Real time
        - Banking holidays: Country specific banking holidays apply
        - Routing Evaluation Order: Not applicable
      example:
        bankCode: bankCode
        country: NG
        bankName: bankName
        accountNumber: accountNumber
      properties:
        bankName:
          description: The name of the identity's bank
          maxLength: 140
          minLength: 2
          pattern: "^(?![ .,'&\\/()-])(?!.*([ .,'&\\/()-])\\1)[\\p{L}\\p{N} .,'&\\\
            /()-]+(?<![ .,'&\\/-])?$"
          type: string
        bankCode:
          description: The bank code of the identity's bank
          maxLength: 50
          minLength: 1
          pattern: "^[A-Za-z0-9 ._-]+$"
          type: string
        accountNumber:
          description: The identity's account number associated with the Account Identification
            Scheme
          maxLength: 21
          minLength: 4
          pattern: "^[a-zA-Z0-9]+$"
          type: string
        country:
          description: "The country of the identity’s bank, using the Alpha-2 code\
            \ as defined in ISO 3166-1.  \nAllowed values are:\n\n- `GH`  \n- `NG`\
            \  \n- `RW`  \n- `UG`  \n- `ZA`  \n- `ZM`\n"
          example: NG
          type: string
      required:
      - accountNumber
      - bankCode
      - bankName
      - country
      type: object
    br-pix:
      description: |
        Rails: PIX

        Rail Definitions:

        PIX:
        - Availability: 24/7/365
        - Limit: No limit
        - Settlement: Instant
        - Cut-off time: None
        - Banking holidays: Not applicable

        Routing Evaluation Order: Not applicable
      example:
        bankCode: bankCode
        branchNumber: branchNumber
        pixKeyType: pixKeyType
        bankName: bankName
        pixKey: pixKey
      properties:
        bankName:
          description: The name of the identity's bank
          maxLength: 140
          minLength: 2
          pattern: "^(?![ .,'&\\/()-])(?!.*([ .,'&\\/()-])\\1)[\\p{L}\\p{N} .,'&\\\
            /()-]+(?<![ .,'&\\/-])?$"
          type: string
        bankCode:
          description: The code of the identity's bank (BICFI code)
          maxLength: 11
          minLength: 8
          pattern: "^[A-Za-z0-9]+$"
          type: string
        branchNumber:
          description: The identity's bank branch number
          maxLength: 6
          minLength: 4
          pattern: "^\\d{4}(-?[0-9X])?$"
          type: string
        pixKey:
          description: "The identity's PIX key, which can be an email, phone number,\
            \ or a hash"
          maxLength: 77
          minLength: 6
          pattern: "(?x) ^( \\+[1-9]\\d{7,15}$ | [\\p{L}\\p{N}._%+\\-]+@[\\p{L}\\\
            p{N}.\\-]+\\.[\\p{L}]{2,} | [0-9A-Fa-f]{8}-[0-9A-Fa-f]{4}-[0-9A-Fa-f]{4}-\
            \ [0-9A-Fa-f]{4}-[0-9A-Fa-f]{12} | \\d{11} | \\d{14} | \\d{3}\\.\\d{3}\\\
            .\\d{3}-\\d{2} | \\d{2}\\.\\d{3}\\.\\d{3}\\/\\d{4}-\\d{2} )$"
          type: string
        pixKeyType:
          description: "The type of PIX key used by the identity.\n\n- `CPF`  \n-\
            \ `CNPJ`  \n- `EMAIL`  \n- `PHONE`  \n- `EVP`\n"
          type: string
      required:
      - bankCode
      - bankName
      - branchNumber
      - pixKey
      - pixKeyType
      type: object
    co-pse:
      description: "Rails: PSE\n\nRail Definitions:\n\nPSE:\n- Availability: Business\
        \ days and banking hours only\n- Limit: None\n- Settlement: \n\t- Major banks\
        \ (Bancolombia, Davivienda, Banco de Bogotá, BBVA, Grupo Aval, Nequi): 35–\
        100 min\n\t- Other banks (via ACH): Same-day or T+1 depending on cutoff\n\
        - Cut-off time: 3PM COT\n- Banking holidays: Colombia banking holidays apply\n\
        \nRouting Evaluation Order: Not applicable\n"
