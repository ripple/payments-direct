            \ as assigned by an institution, using an identification scheme."
          items:
            $ref: '#/components/schemas/business_identity_registration_inner'
          type: array
          x-requiredByBeneficiaryFor:
          - BR_PIX
          - BR_TED
          - CO_PSE
          - CA_EFT
          - US_ACH
          - AFRICA_BANK_PAYOUT
          x-requiredByOriginatorFor:
          - US_ACH
          - CA_EFT
          - BR_PIX
          - BR_TED
          - EU_SEPA
