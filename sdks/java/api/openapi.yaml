          $ref: '#/components/schemas/business_identity_address'
        email:
          description: Address for electronic mail (e-mail).
          example: fake@example.com
          format: email
          maxLength: 255
          minLength: 6
          pattern: "^(?=.{1,254}$)(?:[\\p{L}\\p{N}%+_-]+(?:\\.[\\p{L}\\p{N}%+_-]+)*)@(?:(?:[\\\
            p{L}\\p{N}](?:[\\p{L}\\p{N}-]{0,61}[\\p{L}\\p{N}])?)\\.)+[\\p{L}]{2,63}$"
          type: string
          x-requiredByBeneficiaryFor:
          - BR_PIX
          - BR_TED
          - CO_PSE
          x-requiredByOriginatorFor:
          - BR_PIX
          - BR_TED
        phone:
          description: Phone Number
          example: "1234567890"
          maxLength: 16
          minLength: 8
          pattern: "^\\+[1-9]\\d+$"
          type: string
          x-requiredByBeneficiaryFor:
          - BR_PIX
          - BR_TED
          - AFRICA_BANK_PAYOUT
          x-requiredByOriginatorFor:
          - BR_PIX
          - BR_TED
