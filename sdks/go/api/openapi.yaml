  /v2/ledger-transactions:
    get:
      description: |
        Retrieve a paginated list of ledger transactions for your tenant within a specified date and time range. This endpoint returns detailed transaction data, including amounts, references, operations, and running balances, so you can reconcile balance changes over time for a given currency.
      operationId: getStatementsTransactionsForCustomer
      parameters:
      - description: |
          Three-letter ISO 4217 currency code for the transactions to return (for example, USD).
        example: USD
        explode: true
        in: query
        name: currency
        required: true
        schema:
          type: string
        style: form
      - description: |
          Start of the date and time range (inclusive), in UTC, for which you want to retrieve ledger transactions.
        example: 2022-02-27T08:30:00Z
        explode: true
        in: query
        name: start-dttm
        required: true
        schema:
          format: date-time
          type: string
        style: form
      - description: |
          End of the date and time range (exclusive), in UTC, for which you want to retrieve ledger transactions.
        example: 2022-02-27T08:30:00Z
        explode: true
        in: query
        name: end-dttm
        required: true
        schema:
          format: date-time
          type: string
        style: form
      - description: |
          Filter results by transaction status. Allowed values: - SUCCESS: the ledger transaction completed successfully. - PENDING: reserved for future use to represent an in-flight ledger transaction.
        explode: true
        in: query
        name: status
        required: false
        schema:
          type: string
        style: form
      - description: |
          Filter results by an exact transaction reference. Use this to locate all ledger transactions associated with a specific external reference.
        explode: true
        in: query
        name: txnReference
        required: false
        schema:
          type: string
        style: form
      - description: |
          Number of records to return in the response page. Use page-size together with offset for offset-based pagination
        explode: true
        in: query
        name: page-size
        required: true
        schema:
          default: 25
          maximum: 50
          minimum: 1
          type: integer
        style: form
      - description: |
          Number of records to skip before starting to return results. Use this with page-size to implement offset-based pagination.
          For example, `offset=25&page-size=25` returns the second page of results.
        explode: true
        in: query
        name: offset
        required: false
        schema:
          type: integer
        style: form
      - description: |
          Field to use for sorting the results. Allowed values include: - CREATED_AT: sort by transaction creation timestamp. - STATEMENT_OPERATION: sort by the operation type (for example, CREDIT, DEBIT). - STATEMENT_SOURCE: sort by the transaction source (for example, PAYMENTS, BANK). - STATEMENT_STATUS: sort by the ledger transaction status. - STATEMENT_TXN_REFERENCE: sort by the transaction reference. - STATEMENT_UPDATED_AT: sort by the last update timestamp.
        explode: true
        in: query
        name: sort-key
        required: false
        schema:
          type: string
        style: form
      - description: |
          Sort direction. Allowed values: - ASC: ascending order. - DESC: descending order.
        explode: true
        in: query
        name: sort-direction
        required: false
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/getStatementsTransactionsForCustomer_200_response_inner'
                type: array
            text/csv:
              schema:
                items:
                  $ref: '#/components/schemas/getStatementsTransactionsForCustomer_200_response_inner'
                type: array
          description: |
            A page of ledger statement transactions for the tenant that match the specified query parameters.
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/getBalances_400_response'
          description: Bad request
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/getBalances_400_response'
          description: Unauthorized
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/getBalances_400_response'
          description: Internal server error
      security:
      - Bearer: []
      summary: Get ledger transactions
      tags:
      - ledger-public
components:
  examples:
    error-500-example:
      value:
        code: "500"
        category: APPLICATION
        title: Internal Server Error
        detail: The server encountered an error.
        retryable: true
    error-400-example:
      value:
        code: "400"
        category: CLIENT_ERROR
        title: Bad Request
        detail: Invalid request. Check your request parameters and try again.
        retryable: true
    error-404-example:
      value:
        code: "404"
        category: CLIENT_ERROR
        title: Not Found
        detail: The identity does not exist. Please provide a valid identityId.
        retryable: false
    error-409-example:
      value:
        code: "409"
        category: CLIENT_ERROR
        title: Conflict
        detail: A conflict occurred. The resource already exists or cannot be processed
          due to a conflict.
        retryable: false
  schemas:
    AuthenticationRequest:
      description: The authentication request.
      example:
        audience: "urn:ripplexcurrent-test:{YOUR_TENANT_ID}"
        grant_type: client_credentials
        client_secret: "{YOUR_CLIENT_SECRET}"
        client_id: "{YOUR_CLIENT_ID}"
      properties:
        client_id:
          description: The client ID associated with a specific set of API credentials.
          example: "{YOUR_CLIENT_ID}"
          type: string
        client_secret:
          description: The client secret associated with a specific set of API credentials.
          example: "{YOUR_CLIENT_SECRET}"
          type: string
        audience:
          description: |
            The value of the `audience` field is based on [URN](https://en.wikipedia.org/wiki/Uniform_Resource_Name) syntax.

            **Format**: `urn:ripplexcurrent-{ENVIRONMENT_STRING}:{YOUR_TENANT_ID}`

            * The first component is `urn:ripplenetxcurrent-`.
            * The second component refers to the environment you want to access.
            * The third component is your tenant ID. Ripple integration engineers provide this component during training.

            | Environment | Environment string | Description |
            | --- | --- | --- |
            | Test | `test` | Test environment with simulated partners and simulated currency. |
            | Production | `prod` | Production environment for Ripple's internal services. |

            **Example**: `urn:ripplexcurrent-test:{YOUR_TENANT_ID}`
          example: "urn:ripplexcurrent-test:{YOUR_TENANT_ID}"
          type: string
        grant_type:
          description: Set the grant-type for this client credentials request. This
            must be set to `client_credentials`.
          enum:
          - client_credentials
          example: client_credentials
          type: string
      required:
      - audience
      - client_id
      - client_secret
      - grant_type
      type: object
    AuthenticationResponse:
      description: "The authentication response object that includes the token, type,\
        \ scopes, and expiry."
      example:
        access_token: eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzUxMiJ9.eyJ
        scope: pos:payments:create quote_collection:quote:create quote:quote:read
          pos:payments:read pcs_config:external_read data_requirements:read identities:create
          identities:read identities:write ledger:balance:read ledger:read
        token_type: Bearer
        expires_in: 3600
      properties:
        access_token:
          description: The bearer token you use when authenticating with a Ripple
            API.
          example: eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzUxMiJ9.eyJ
          type: string
        scope:
          description: List of scopes applied to your `access_token`.
          example: pos:payments:create quote_collection:quote:create quote:quote:read
            pos:payments:read pcs_config:external_read data_requirements:read identities:create
            identities:read identities:write ledger:balance:read ledger:read
          type: string
        expires_in:
          description: How long your `access_token` is valid. You need to request
            a new token when it expires.
          example: 3600
          format: int64
          type: integer
        token_type:
          description: The type of token. Ripple APIs use `Bearer` auth tokens.
          example: Bearer
          type: string
      type: object
    ErrorResponse:
      description: The response object containing the error and its description if
        the authentication call fails.
      example:
        error_description: Unauthorized
        error: access_denied
      properties:
        error_description:
          description: Summary of the returned problem.
          example: Unauthorized
          type: string
        error:
          description: Error status.
          example: access_denied
          type: string
    ValidateTokenResponse:
      description: The response object indicating a token's validity and the time
        remaining on it
      example:
        seconds_to_expiry: 3600
        message: token_ok
      properties:
        message:
          example: token_ok
          type: string
        seconds_to_expiry:
          description: Remaining time in seconds before the tested token expires.
          example: 3600
          format: int64
          type: integer
    PaymentErrorResponse:
      example:
        errors:
          code: SYS_003
          description: "The payout category value must be one of BANK, EWALLET, CASH_PICKUP,\
            \ or ATM."
          type: SYSTEM_ERROR
