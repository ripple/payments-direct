          example: USD
          type: string
        availableBalance:
          description: Available funded balance that you can use to initiate payments.
          example: 1000
          type: number
        reservedBalance:
          description: Amount reserved to complete in-progress transactions. You can't
            use this amount to initiate new payments.
          example: 100
          type: number
