        "404":
          content:
            application/json:
              example:
                status: 404
                errors:
                  code: USR_002
                  type: NOT_FOUND
                  title: Resource Not Found
                  description: The requested resource could not be found.
                  timestamp: 2024-12-01T12:00:00Z
              schema:
