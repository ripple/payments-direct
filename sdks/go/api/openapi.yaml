        flowType: B2B
      properties:
        paymentProduct:
          description: The Ripple payments product used to make this payment.
          nullable: true
          type: string
          x-enumDescriptions:
            LICENSED: Identifies a transaction using Ripple Payments Direct.
        flowType:
          description: Specifies the type of payment you're making as categorized
            by the identity type of the payment originator and beneficiary.
          enum:
          - B2B
          - B2C
          - C2B
          - C2C
          nullable: true
          type: string
          x-enumDescriptions:
            B2B: |
              Specifies that this payment is made by a business originator to a business beneficiary.
              </br></br>
              **Identification of third-party payment**:
                * If the `thirdPartyPayment` property is `true`, it indicates that you're making this payment on behalf of a business originator.
                * If the `thirdPartyPayment` property is `false`, it indicates that you are the business originator making this payment.
            B2C: |
              Specifies that this payment is made by a business originator to an individual beneficiary.
              </br></br>
              **Identification of third-party payment**:
                * If the `thirdPartyPayment` property is `true`, it indicates that you're making this payment on behalf of a business originator.
                * If the `thirdPartyPayment` property is `false`, it indicates that you are the business originator making this payment.
        thirdPartyPayment:
          description: Flag to indicate if this payment is initiated on behalf of
            a third-party originator.
          example: false
          nullable: true
          type: boolean
        businessUseCase:
          description: Indicates the type of payment you're making.
          enum:
          - ON_RAMP
          - OFF_RAMP
          - FIAT_TRANSFER
          - CRYPTO_TRANSFER
          nullable: true
          type: string
          x-enumDescriptions:
            FIAT_TRANSFER: Indicates fiat source currency to fiat destination.
      type: object
    PayoutExecutionDetails:
      description: |
        Metadata about the payout execution, including the payment rail used, timing, and tracking references.

        `payoutExecutionDetails` is an optional field that should be treated as informational only. Do not build required workflows that depend on its presence, as availability varies by corridor and partner.

        When present, `trackingReferences` provides network-specific identifiers useful for audit, reconciliation, or customer inquiry resolution. Use the `referenceType` field on each tracking reference to identify what a value represents rather than relying on its position in the array.

        Coverage will expand as additional corridors and partners are onboarded.
      example:
        payoutStartTime: 2026-02-18T14:22:15.789Z
        trackingReferences:
        - displayName: IMAD Number
          referenceType: IMAD
          description: Input Message Accountability Data (IMAD) for Fedwire transfer
            tracking
          value: TXN-RTP-20260218-456789
        - displayName: IMAD Number
          referenceType: IMAD
          description: Input Message Accountability Data (IMAD) for Fedwire transfer
            tracking
          value: TXN-RTP-20260218-456789
        payoutEndTime: 2026-02-18T14:25:30.123Z
        paymentRailUsed: FEDWIRE
      properties:
        paymentRailUsed:
          description: |
            The payment rail or network used to execute the payout (e.g., FEDWIRE, ACH, RTP, SEPA, SWIFT).
          example: FEDWIRE
          type: string
        payoutStartTime:
          description: |
            The time at which the payout execution started, specified in UTC.
          example: 2026-02-18T14:22:15.789Z
          format: date-time
          type: string
        payoutEndTime:
          description: |
            The timestamp when the payout execution completed or was last updated, as reported by the payout partner.
            Specified in UTC using ISO 8601 format. For in-progress payouts, this may represent the last status update time.
          example: 2026-02-18T14:25:30.123Z
          format: date-time
          type: string
        trackingReferences:
          description: |
            A list of tracking references for this transaction, such as transaction IDs and confirmation numbers.
          items:
            $ref: '#/components/schemas/TrackingReference'
          type: array
      type: object
    TrackingReference:
      description: |
        A tracking reference provided by the payout partner for this transaction.
      example:
        displayName: IMAD Number
        referenceType: IMAD
        description: Input Message Accountability Data (IMAD) for Fedwire transfer
          tracking
        value: TXN-RTP-20260218-456789
      properties:
        referenceType:
          description: |
            The type or category of this tracking reference. Known values include IMAD and OMAD for Fedwire transfers, but additional types may be provided depending on the payment rail and payout partner.
          example: IMAD
          type: string
        value:
          description: The tracking reference value. Use this to locate the transaction
            with the payout partner or payment rail operator. Format varies by referenceType.
          example: TXN-RTP-20260218-456789
          type: string
        displayName:
          description: "A human-readable name for this tracking reference, suitable\
            \ for display in user interfaces."
          example: IMAD Number
          type: string
        description:
          description: A detailed description of what this tracking reference represents
            and how it can be used.
          example: Input Message Accountability Data (IMAD) for Fedwire transfer tracking
          type: string
      type: object
