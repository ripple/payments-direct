        content:
          application/json:
            schema:
              $ref: '#/components/schemas/create-identity-request-v2'
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/create-identity-response'
          description: successful operation
        "400":
          content:
            application/json:
              example:
                status: 400
                errors:
                - code: USR_101
                  title: Bad Request
                  type: USER_ERROR
                  description: Invalid request. Check your request body and try again.
                  timestamp: 2025-05-23T15:02:56.516Z
              schema:
                $ref: '#/components/schemas/error-response'
          description: Invalid Request
        "500":
          content:
            application/json:
              example:
                status: 500
                errors:
                - code: SYS_001
                  title: Internal server error
                  type: SYSTEM_ERROR
                  description: Unable to process the request due to an internal server
                    error.
                  timestamp: 2025-05-23T15:02:56.516Z
              schema:
                $ref: '#/components/schemas/error-response'
