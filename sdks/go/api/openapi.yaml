    getStatementsTransactionsForCustomer_200_response_inner_statementTransactions_inner:
      example:
        availableBalanceAfter: 90
        amount: 100
        createdDttm: 2024-06-01T00:00:00Z
        updatedDttm: 2024-06-01T00:00:00Z
        txnSource: txnSource
        currency: USD
        availableBalanceBefore: 100
        operation: operation
        tenant: rocketfuel
        txnReference: txnReference
        status: status
      properties:
        tenant:
          description: Identifier of the tenant that owns this ledger transaction.
          example: rocketfuel
          type: string
        amount:
          description: |
            Amount of the transaction applied to the tenant’s ledger account.
          example: 100
          type: number
        currency:
          description: Three-letter ISO 4217 currency code of the transaction.
          example: USD
          type: string
        txnReference:
          description: |
            External reference that links this ledger transaction to a payment or other upstream operation. Present for RESERVE and DEBIT operations, where it matches the Payments Direct payment ID. Null for all other operation types.
          nullable: true
          type: string
        operation:
          description: |
            Operation performed on the tenant’s prefunded ledger account.
          type: string
          x-enumDescriptions:
            CREDIT: Credit to the ledger account.
            RESERVE: Funds reserved in an intermediate state.
            DEBIT: Funds debited from the reserved state.
            RELEASE: Reserved funds released back to the account.
            VOID_PREFUND_BALANCE: "Prefund balance has been voided. [Deprecated]"
            OVERRIDE_PREFUND_BALANCE: "Prefund balance has been overridden. [Deprecated]"
            VOID_BALANCE: Balance has been voided.
            OVERRIDE_BALANCE: Balance has been overridden.
        txnSource:
          description: |
            Source of the ledger transaction (for example, which system or flow created it).
          type: string
          x-enumDescriptions:
            PAYMENTS: Created by a payments flow.
            BANK: Created by a bank transaction.
            POSTED_PAYMENT: Created by a posted payment operation.
            CREDIT_MEMO: Created by a credit memo.
            MANUAL: Created manually via API.
        status:
          description: State of the ledger transaction.
          type: string
          x-enumDescriptions:
            SUCCESS: Ledger transaction completed successfully.
            PENDING: Reserved for future use to represent an in-flight ledger transaction.
        createdDttm:
          description: Timestamp (UTC) when the ledger transaction was created.
          example: 2024-06-01T00:00:00Z
          format: date-time
          nullable: false
          type: string
        updatedDttm:
          description: Timestamp (UTC) when the ledger transaction was last updated.
          example: 2024-06-01T00:00:00Z
          format: date-time
          nullable: false
          type: string
        availableBalanceBefore:
          description: |
            Available ledger account balance (in the transaction currency) immediately before this transaction was applied.
          example: 100
          type: number
        availableBalanceAfter:
          description: |
            Available ledger account balance (in the transaction currency) immediately after this transaction was applied.
          example: 90
          type: number
      type: object
