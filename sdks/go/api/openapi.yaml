      - Bearer: []
      summary: Create a new identity (v2) - Legacy
      tags:
      - IdentitiesV2
  /v2/identities/{identity-id}:
    delete:
      description: |
        Deactivate an identity and its financial instruments.
        Deactivation is permanent and prevents further use in payments.
        Historical versions remain available for audit.
      operationId: deactivateIdentityV2
      parameters:
      - description: ID of the identity to deactivate.
        example: 146f3c51-c313-47ce-b6f2-691c5a238b3e
        explode: false
        in: path
        name: identity-id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "204":
          description: Identity deactivated.
        "400":
          content:
            application/json:
              example:
                status: 400
                errors:
                - code: USR_102
                  title: Bad request
                  type: USER_ERROR
                  description: Unable to get identity. Identity ID should be in UUID
                    format.
                  timestamp: 2025-05-23T15:02:56.516Z
              schema:
                $ref: '#/components/schemas/error-response'
          description: Invalid request.
        "404":
          content:
            application/json:
              example:
                status: 404
                errors:
                - code: USR_103
                  title: Identity not found
                  type: NOT_FOUND
                  description: No identity exists for identityId
                  timestamp: 2025-05-23T15:02:56.516Z
              schema:
                $ref: '#/components/schemas/error-response'
          description: Identity not found.
        "422":
          content:
            application/json:
              example:
                status: 422
                errors:
                - code: USR_104
                  title: Invalid request
                  type: USER_ERROR
                  description: The identity has already been deactivated.
                  timestamp: 2025-05-23T15:02:56.516Z
              schema:
                $ref: '#/components/schemas/error-response'
          description: Identity already deactivated or cannot be deactivated.
        "500":
          content:
            application/json:
              example:
                status: 500
                errors:
                - code: SYS_001
                  title: Internal server error
                  type: SYSTEM_ERROR
                  description: Unable to process the request due to an internal server
                    error.
                  timestamp: 2025-05-23T15:02:56.516Z
              schema:
                $ref: '#/components/schemas/error-response'
          description: Internal processing error
      security:
      - Bearer: []
      summary: Delete an identity (v2) - Legacy
      tags:
      - IdentitiesV2
    get:
      description: |
        Retrieve a specific identity by ID.
        If `version` is not provided, the latest version is returned.
      operationId: getIdentityByIdV2
      parameters:
      - description: The ID of the identity to retrieve.
        example: 146f3c51-c313-47ce-b6f2-691c5a238b3e
        explode: false
        in: path
        name: identity-id
        required: true
        schema:
          type: string
        style: simple
      - description: "Specific version to retrieve. If omitted, returns the latest\
          \ version."
        example: 2
        explode: true
        in: query
        name: version
        required: false
        schema:
          minimum: 1
          type: integer
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/identity-response-v2'
          description: Identity details.
        "400":
          content:
            application/json:
              example:
                status: 400
                errors:
                - code: USR_102
                  title: Bad request
                  type: USER_ERROR
                  description: Unable to get identity. Identity ID should be in UUID
                    format.
                  timestamp: 2025-05-23T15:02:56.516Z
              schema:
                $ref: '#/components/schemas/error-response'
          description: Invalid identity ID.
        "404":
          content:
            application/json:
              example:
                status: 404
                errors:
                - code: USR_103
                  title: Identity not found
                  type: NOT_FOUND
                  description: No identity exists for identityId
                  timestamp: 2025-05-23T15:02:56.516Z
              schema:
                $ref: '#/components/schemas/error-response'
          description: Identity not found.
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error-response'
          description: Internal processing error.
      security:
      - Bearer: []
      summary: Get an identity by ID (v2) - Legacy
      tags:
