        - batchId=aaaaaaaa-1111-bbbb-abab-123412341234
        - batchId=aaaaaaaa-1111-bbbb-abab-123412341234
        afterTimestamp: 2024-03-24T13:15:22Z
        paymentStates:
        - INITIATED
        - INITIATED
